<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KK United — Team Performance Tracker v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e8e8e8; font-family: 'DM Sans', sans-serif; }
    .app { min-height: 100vh; background: #0f0f0f;
      background-image: radial-gradient(ellipse at 20% 0%, rgba(170,255,0,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(0,229,255,0.05) 0%, transparent 60%); }
    .header { padding: 28px 40px 20px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 18px; }
    .header-ball { width: 42px; height: 42px; background: #AAFF00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 20px rgba(170,255,0,0.4); flex-shrink: 0; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; color: #fff; line-height: 1; }
    .header h1 span { color: #AAFF00; }
    .header-sub { font-size: 0.75rem; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .version-badge { background: rgba(170,255,0,0.12); border: 1px solid rgba(170,255,0,0.3); color: #AAFF00; border-radius: 6px; padding: 3px 10px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; margin-left: auto; flex-shrink: 0; }
    .nav { display: flex; gap: 4px; padding: 16px 40px 0; border-bottom: 1px solid #1e1e1e; overflow-x: auto; }
    .nav-btn { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: #999; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px; }
    .nav-btn:hover { color: #ccc; }
    .nav-btn.active { color: #AAFF00; border-bottom-color: #AAFF00; }
    .content { padding: 32px 40px; max-width: 1100px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #AAFF00, transparent); }
    .stat-card .label { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: #fff; line-height: 1; }
    .stat-card .value.accent { color: #AAFF00; }
    .table-wrap { background: #161616; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px 16px; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: #999; border-bottom: 1px solid #222; font-weight: 600; }
    td { padding: 12px 16px; font-size: 0.88rem; border-bottom: 1px solid #1a1a1a; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.3px; }
    .badge-win  { background: rgba(170,255,0,0.12); color: #AAFF00; border: 1px solid rgba(170,255,0,0.2); }
    .badge-loss { background: rgba(255,80,80,0.1); color: #ff6060; border: 1px solid rgba(255,80,80,0.2); }
    .badge-draw { background: rgba(255,200,0,0.1); color: #ffc800; border: 1px solid rgba(255,200,0,0.2); }
    .badge-champion { background: rgba(255,215,0,0.18); color: #FFD700; border: 1px solid rgba(255,215,0,0.35); }
    .badge-tourn { background: rgba(255,200,0,0.1); color: #ffc800; border: 1px solid rgba(255,200,0,0.25); }
    .win-rate-bar { height: 4px; background: #222; border-radius: 4px; margin-top: 6px; }
    .win-rate-fill { height: 100%; background: #AAFF00; border-radius: 4px; transition: width 0.5s ease; }
    .form-section { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 28px; margin-bottom: 20px; }
    .form-section h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; color: #AAFF00; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .form-full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: #999; }
    .field input, .field select, .field textarea { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 10px 12px; transition: border-color 0.2s; width: 100%; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #AAFF00; }
    .field select option { background: #1a1a1a; }
    .field textarea { resize: vertical; min-height: 70px; }
    .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; letter-spacing: 0.3px; }
    .btn-primary   { background: #AAFF00; color: #0f0f0f; box-shadow: 0 0 18px rgba(170,255,0,0.25); }
    .btn-primary:hover { background: #c8ff40; box-shadow: 0 0 24px rgba(170,255,0,0.4); }
    .btn-secondary { background: #1e1e1e; color: #ccc; border: 1px solid #2a2a2a; }
    .btn-secondary:hover { background: #252525; color: #e8e8e8; }
    .btn-danger    { background: rgba(255,80,80,0.1); color: #ff6060; border: 1px solid rgba(255,80,80,0.2); }
    .btn-danger:hover { background: rgba(255,80,80,0.2); }
    .btn-sm { padding: 6px 14px; font-size: 0.78rem; }
    .player-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #ccc; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .player-chip.selected { background: rgba(170,255,0,0.1); border-color: #AAFF00; color: #AAFF00; }
    .player-chip:hover:not(.selected) { border-color: #444; color: #ddd; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: #1e1e1e; border: 1px solid #2a2a2a; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: #AAFF00; flex-shrink: 0; }
    .player-name-cell { display: flex; align-items: center; gap: 10px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1.5px; color: #fff; margin-bottom: 20px; }
    .section-title span { color: #AAFF00; }
    .empty-state { text-align: center; padding: 50px 20px; color: #888; font-size: 0.9rem; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .top-badge { background: linear-gradient(135deg, #AAFF00, #7fff00); color: #0f0f0f; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; }
    .tabs-inner { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 7px 16px; background: #1a1a1a; border: 1px solid #252525; border-radius: 6px; color: #999; cursor: pointer; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tab-btn.active { background: rgba(170,255,0,0.1); border-color: #AAFF00; color: #AAFF00; }
    .tab-btn.tab-tourn.active { background: rgba(255,200,0,0.1); border-color: #ffc800; color: #ffc800; }
    .divider { height: 1px; background: #1e1e1e; margin: 24px 0; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; }
    .alert-success { background: rgba(170,255,0,0.08); border: 1px solid rgba(170,255,0,0.2); color: #AAFF00; }
    .alert-error   { background: rgba(255,80,80,0.1);  border: 1px solid rgba(255,80,80,0.2);  color: #ff8080; }
    .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .io-card { background: #0f0f0f; border: 1px solid #222; border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .io-card h4 { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; }
    .io-card p   { font-size: 0.8rem; color: #999; line-height: 1.5; }
    .file-drop { border: 2px dashed #2a2a2a; border-radius: 8px; padding: 20px; text-align: center; font-size: 0.8rem; color: #888; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .file-drop:hover { border-color: rgba(170,255,0,0.27); color: #bbb; }
    .file-drop.drag-over { border-color: #AAFF00; color: #AAFF00; background: rgba(170,255,0,0.031); }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .bulk-table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* Tournament card styles */
    .tourn-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .tourn-card-header { padding: 18px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: background 0.15s; }
    .tourn-card-header:hover { background: rgba(255,255,255,0.02); }
    .tourn-card-body { border-top: 1px solid #1e1e1e; }
    /* Round label pill */
    .round-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem; letter-spacing: 1.5px; }
    @media (max-width: 1024px) {
      .header { padding: 20px 20px 16px; } .header h1 { font-size: 1.8rem; }
      .nav { padding: 12px 20px 0; gap: 2px; } .nav-btn { padding: 8px 14px; font-size: 0.78rem; }
      .content { padding: 24px 20px; } .io-grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      th, td { padding: 10px 12px; }
    }
    @media (max-width: 768px) {
      .header { padding: 16px 16px 12px; gap: 12px; } .header h1 { font-size: 1.5rem; }
      .header-ball { width: 34px; height: 34px; font-size: 16px; }
      .nav { padding: 10px 16px 0; } .nav-btn { padding: 7px 10px; font-size: 0.72rem; letter-spacing: 0; }
      .content { padding: 20px 16px; } .section-title { font-size: 1.3rem; }
      .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-card { padding: 14px; } .stat-card .value { font-size: 1.8rem; }
      .form-section { padding: 18px; } .form-grid { grid-template-columns: 1fr; }
      th { font-size: 0.62rem; padding: 8px 10px; } td { font-size: 0.8rem; padding: 8px 10px; }
      .version-badge { display: none; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-btn { padding: 6px 8px; font-size: 0.68rem; }
    }
    @media (hover: none) and (pointer: coarse) {
      .btn { min-height: 44px; } .nav-btn { min-height: 40px; }
      .player-chip { padding: 8px 14px; }
      .field input, .field select, .field textarea { padding: 12px 14px; font-size: 1rem; }
    }
    @media print {
      body { background: #fff !important; color: #111 !important; }
      .app { background: #fff !important; }
      .header, .nav, .no-print { display: none !important; }
      .print-area { display: block !important; }
      .team-card-print { break-inside: avoid; border: 1px solid #ccc !important; background: #fff !important; color: #111 !important; }
      .print-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 16px; }
      .print-team-name { font-size: 1.2rem; font-weight: 700; border-bottom: 2px solid #111; padding-bottom: 6px; margin-bottom: 10px; }
      .print-slot { border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; }
      .print-slot-cat { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; }
      .print-slot-names { font-size: 1rem; font-weight: 600; color: #111; }
      .print-slot-stat { font-size: 0.72rem; color: #777; }
      .content { padding: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STORAGE_KEY_PLAYERS = "kkUnited_players";
    const STORAGE_KEY_MATCHES  = "kkUnited_matches";
    const ACCENT  = "#AAFF00";
    const ACCENT2 = "#00E5FF";

    // ── helpers ──────────────────────────────────────────────────────────────
    function initials(name) {
      return (name||"").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    }
    function genId() { return Math.random().toString(36).slice(2, 9); }
    function getPlayerMap(players) { return Object.fromEntries(players.map(p => [p.id, p])); }
    function playerLabel(ids, playerMap) { return ids.map(id => playerMap[id]?.name || "?").join(" & "); }
    function parsePointsDiff(score) {
      if (!score) return 0;
      let t1=0, t2=0;
      score.split(/[,;]\s*/).forEach(set => {
        const parts = set.trim().split("-").map(Number);
        if (parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1])) { t1+=parts[0]; t2+=parts[1]; }
      });
      return t1-t2;
    }
    // Backward-compat: old matches used `round` as category
    function matchCategory(m) {
      if (m.category) return m.category;
      if (["MD","WD","XD"].includes(m.round)) return m.round;
      return "MD";
    }
    function roundLabel(key) {
      return TOURNAMENT_ROUNDS.find(r => r.key === key)?.label || key || "—";
    }

    // ── localStorage ─────────────────────────────────────────────────────────
    function loadData(key) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch { return null; }
    }
    function saveData(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    // ── CATEGORIES (v2 adds MS, WS) ──────────────────────────────────────────
    const CATEGORIES = [
      { key:"MD", label:"Men's Doubles",   fmt:"doubles",       color:ACCENT2,   g1:"M", g2:"M" },
      { key:"WD", label:"Women's Doubles", fmt:"doubles",       color:"#ff80c8", g1:"F", g2:"F" },
      { key:"XD", label:"Mixed Doubles",   fmt:"mixed_doubles", color:"#FF9500", g1:"M", g2:"F" },
    ];
    const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));

    const TOURNAMENT_ROUNDS = [
      {key:"group", label:"Group Stage"},
      {key:"r32",   label:"Round of 32"},
      {key:"r16",   label:"Round of 16"},
      {key:"qf",    label:"Quarterfinal"},
      {key:"sf",    label:"Semifinal"},
      {key:"3rd",   label:"3rd Place"},
      {key:"final", label:"Final"},
      {key:"other", label:"Other"},
    ];
    const ROUND_ORDER = {group:0,r32:1,r16:2,qf:3,sf:4,"3rd":5,final:6,other:7};

    const GENDER_OPTS = [
      { value: "M", label: "Male",   icon: "♂" },
      { value: "F", label: "Female", icon: "♀" },
    ];

    function emptyBulkRow(category) {
      return { _id:genId(), category, player1:"", player2:"", oppPlayer1:"", oppPlayer2:"", score:"", winner:"team1", notes:"" };
    }
    function emptyTournamentRow() {
      return { _id:genId(), category:"MD", round:"group", player1:"", player2:"", oppLabel:"", score:"", winner:"team1", notes:"" };
    }

    // ════════════════════════════════════════════════════════════════════════
    // APP
    // ════════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab]         = useState("dashboard");
      const [players, setPlayers] = useState([]);
      const [matches, setMatches] = useState([]);
      const [loaded, setLoaded]   = useState(false);

      useEffect(() => {
        const p = loadData(STORAGE_KEY_PLAYERS);
        const m = loadData(STORAGE_KEY_MATCHES);
        if (p) setPlayers(p);
        if (m) setMatches(m);
        setLoaded(true);
      }, []);
      useEffect(() => { if (loaded) saveData(STORAGE_KEY_PLAYERS, players); }, [players, loaded]);
      useEffect(() => { if (loaded) saveData(STORAGE_KEY_MATCHES,  matches); }, [matches, loaded]);

      const addPlayer    = p     => setPlayers(prev => [...prev, { id: genId(), ...p }]);
      const removePlayer = id    => setPlayers(prev => prev.filter(p => p.id !== id));
      const updatePlayer = (id,d)=> setPlayers(prev => prev.map(p => p.id===id ? {...p,...d} : p));
      const addMatch     = m     => setMatches(prev => [...prev, { ...m, id: genId() }]);
      const removeMatch  = id    => setMatches(prev => prev.filter(m => m.id !== id));
      const updateMatch  = (id,d)=> setMatches(prev => prev.map(m => m.id===id ? {...m,...d} : m));

      const handleExport = () => {
        const data = { version: 2, exportedAt: new Date().toISOString(), players, matches };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = `kk-united-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
      };
      const handleImport = (file, onResult) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data.players) || !Array.isArray(data.matches)) {
              onResult({ ok:false, msg:"Invalid file: missing players or matches arrays." }); return;
            }
            setPlayers(data.players); setMatches(data.matches);
            onResult({ ok:true, msg:`Imported ${data.players.length} players and ${data.matches.length} matches.` });
          } catch { onResult({ ok:false, msg:"Could not parse file." }); }
        };
        reader.readAsText(file);
      };

      const tabs = [
        { id:"dashboard", label:"📊 Dashboard" },
        { id:"roster",    label:"👥 Roster" },
        { id:"log",       label:"➕ Log Match" },
        { id:"history",   label:"📋 History" },
        { id:"stats",     label:"🏆 Statistics" },
        { id:"builder",   label:"🧩 Team Builder" },
        { id:"data",      label:"⚙️ Data" },
      ];

      return (
        <div className="app">
          <header className="header">
            <div className="header-ball">🏓</div>
            <div>
              <h1>KK <span>UNITED</span></h1>
              <div className="header-sub">Team Performance Tracker</div>
            </div>
            <div className="version-badge">V2</div>
          </header>
          <nav className="nav">
            {tabs.map(t => (
              <button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
            ))}
          </nav>
          <div className="content">
            {tab==="dashboard" && <Dashboard players={players} matches={matches} />}
            {tab==="roster"    && <Roster players={players} onAdd={addPlayer} onRemove={removePlayer} onUpdate={updatePlayer} matches={matches} />}
            {tab==="log"       && <LogMatch players={players} onAdd={addMatch} />}
            {tab==="history"   && <History matches={matches} players={players} onRemove={removeMatch} onUpdate={updateMatch} onAdd={addMatch} />}
            {tab==="stats"     && <Stats players={players} matches={matches} />}
            {tab==="builder"   && <TeamBuilder players={players} matches={matches} />}
            {tab==="data"      && <DataPanel players={players} matches={matches} onExport={handleExport} onImport={handleImport} />}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // DASHBOARD
    // ════════════════════════════════════════════════════════════════════════
    function Dashboard({ players, matches }) {
      const playerMap         = getPlayerMap(players);
      const friendlyMatches   = matches.filter(m => m.type !== "tournament");
      const isInternal = m => /^(kk\s*united|kku)$/i.test((m.team2Label||"").trim());
      const externalMatches   = friendlyMatches.filter(m => !isInternal(m));
      const totalMatches      = externalMatches.length;
      const ourWins           = externalMatches.filter(m => m.winner==="team1").length;
      const winRate           = totalMatches ? Math.round((ourWins/totalMatches)*100) : 0;

      const playerWins = {};
      externalMatches.forEach(m => {
        (m.winner==="team1" ? m.team1 : []).forEach(id => { playerWins[id]=(playerWins[id]||0)+1; });
      });
      const topPlayer = Object.entries(playerWins).sort((a,b)=>b[1]-a[1])[0];

      const friendlySessions = useMemo(() => {
        const map = {};
        friendlyMatches.forEach(m => {
          const opp = (m.team2Label||"Unknown").trim();
          const key = `${m.date}||${opp}`;
          if (!map[key]) map[key] = { date:m.date, opponent:opp, matches:[] };
          map[key].matches.push(m);
        });
        return Object.values(map).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s => {
          const cats = {MD:{w:0,l:0},WD:{w:0,l:0},XD:{w:0,l:0}};
          s.matches.forEach(m => {
            const cat = matchCategory(m);
            const b = cats[cat]||(cats[cat]={w:0,l:0});
            if (m.winner==="team1") b.w++; else if (m.winner==="team2") b.l++;
          });
          const totalW = s.matches.filter(m=>m.winner==="team1").length;
          const total  = s.matches.length;
          const pct    = total ? Math.round((totalW/total)*100) : 0;
          return { ...s, cats, totalW, total, pct };
        });
      }, [friendlyMatches]);

      return (
        <div>
          <div className="section-title">OVERVIEW <span>—</span></div>
          <div className="stat-grid">
            <div className="stat-card"><div className="label">Friendly Games</div><div className="value accent">{totalMatches}</div></div>
            <div className="stat-card"><div className="label">Friendly Sessions</div><div className="value">{friendlySessions.length}</div></div>
            <div className="stat-card">
              <div className="label">Overall Win Rate</div>
              <div className="value accent">{winRate}%</div>
              <div className="win-rate-bar"><div className="win-rate-fill" style={{width:`${winRate}%`}} /></div>
            </div>
            <div className="stat-card"><div className="label">Roster Size</div><div className="value">{players.length}</div></div>
            <div className="stat-card">
              <div className="label">MVP (Most Wins)</div>
              <div className="value" style={{fontSize:"1.1rem",paddingTop:6}}>{topPlayer ? playerMap[topPlayer[0]]?.name||"—":"—"}</div>
              {topPlayer && <div style={{color:ACCENT,fontSize:"0.75rem",marginTop:4}}>{topPlayer[1]} wins</div>}
            </div>
          </div>

          <div className="section-title" style={{fontSize:"1.2rem",marginBottom:16}}>FRIENDLY <span>SESSIONS</span></div>
          {friendlySessions.length===0 ? (
            <div className="empty-state" style={{marginBottom:32}}><div className="icon">🏓</div>No friendly matches yet.</div>
          ) : (
            <div className="table-wrap table-scroll" style={{marginBottom:32}}>
              <table>
                <thead><tr>
                  <th>Date</th><th>Opponent</th>
                  <th style={{textAlign:"center"}}>Total</th>
                  <th style={{textAlign:"center",color:ACCENT2}}>MD</th>
                  <th style={{textAlign:"center",color:"#ff80c8"}}>WD</th>
                  <th style={{textAlign:"center",color:"#FF9500"}}>XD</th>
                  <th style={{textAlign:"center"}}>Win %</th><th>Result</th>
                </tr></thead>
                <tbody>
                  {friendlySessions.map((s,i) => {
                    const rc = s.pct>=60?ACCENT:s.pct>=40?"#ffc800":"#ff6060";
                    return (
                      <tr key={i}>
                        <td style={{color:"#999",fontSize:"0.82rem",whiteSpace:"nowrap",fontWeight:600}}>{s.date}</td>
                        <td style={{fontWeight:500}}>{s.opponent}</td>
                        <td style={{textAlign:"center"}}><WLCell w={s.totalW} l={s.total-s.totalW} /></td>
                        {["MD","WD","XD"].map(cat=>(
                          <td key={cat} style={{textAlign:"center"}}>
                            {(s.cats[cat]?.w||0)+(s.cats[cat]?.l||0)>0
                              ? <WLCell w={s.cats[cat].w} l={s.cats[cat].l}/>
                              : <span style={{color:"#444"}}>—</span>}
                          </td>
                        ))}
                        <td style={{minWidth:100}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:"0.82rem",fontWeight:600,color:rc,minWidth:34}}>{s.pct}%</span>
                            <div style={{flex:1,height:4,background:"#222",borderRadius:4}}>
                              <div style={{width:`${s.pct}%`,height:"100%",background:rc,borderRadius:4}} />
                            </div>
                          </div>
                        </td>
                        <td><span className={`badge badge-${s.pct>50?"win":s.pct===50?"draw":"loss"}`}>{s.pct>50?"WIN":s.pct===50?"DRAW":"LOSS"}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function WLCell({ w, l }) {
      return (
        <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"0.95rem",letterSpacing:"1px",whiteSpace:"nowrap"}}>
          <span style={{color:ACCENT}}>{w}</span>
          <span style={{color:"#999",margin:"0 2px"}}>–</span>
          <span style={{color:"#ff6060"}}>{l}</span>
        </span>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // ROSTER
    // ════════════════════════════════════════════════════════════════════════
    function suggestInitials(name) {
      return name.trim().split(/\s+/).filter(Boolean).map(w=>w[0].toUpperCase()).join("").slice(0,3);
    }

    function Roster({ players, onAdd, onRemove, onUpdate, matches }) {
      const emptyForm = { name:"", initials:"", gender:"", dupr:"" };
      const [form, setForm]         = useState(emptyForm);
      const [initialsEdited, setIE] = useState(false);
      const [err, setErr]           = useState("");
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm]   = useState({ name:"", initials:"", dupr:"" });

      const setField = (k,v) => setForm(f=>({...f,[k]:v}));
      const handleNameChange = val => {
        setField("name", val);
        if (!initialsEdited) setField("initials", suggestInitials(val));
      };
      const handleInitialsChange = val => {
        setIE(val!==""); setField("initials", val.toUpperCase().slice(0,3));
      };
      const handleAdd = () => {
        if (!form.name.trim()) { setErr("Please enter a player name."); return; }
        if (players.find(p=>p.name.toLowerCase()===form.name.trim().toLowerCase())) { setErr("Player already exists."); return; }
        if (!form.gender) { setErr("Please select a gender."); return; }
        const fin = form.initials.trim() || suggestInitials(form.name);
        onAdd({ name:form.name.trim(), initials:fin, gender:form.gender, dupr:form.dupr.trim() });
        setForm(emptyForm); setIE(false); setErr("");
      };

      const playerStats = useMemo(() => {
        const stats = {};
        players.forEach(p => { stats[p.id] = { played:0, wins:0 }; });
        matches.forEach(m => {
          m.team1.forEach(id => {
            if (stats[id]) { stats[id].played++; if (m.winner==="team1") stats[id].wins++; }
          });
        });
        return stats;
      }, [players, matches]);

      const gLabel = g => GENDER_OPTS.find(o=>o.value===g)||{icon:"—",label:""};

      const startEdit = p => { setEditingId(p.id); setEditForm({ name:p.name, initials:p.initials||initials(p.name), dupr:p.dupr||"" }); };
      const saveEdit  = id => {
        if (!editForm.name.trim()) return;
        const fin = editForm.initials.trim() || suggestInitials(editForm.name);
        onUpdate(id, { name:editForm.name.trim(), initials:fin, dupr:editForm.dupr.trim() });
        setEditingId(null);
      };
      const cancelEdit = () => setEditingId(null);

      return (
        <div>
          <div className="section-title">TEAM <span>ROSTER</span></div>
          <div className="form-section">
            <h3>Add Player</h3>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="form-grid">
              <div className="field" style={{gridColumn:"span 2"}}>
                <label>Full Name</label>
                <input value={form.name} onChange={e=>handleNameChange(e.target.value)} placeholder="e.g. Alex Chen" onKeyDown={e=>e.key==="Enter"&&handleAdd()} />
              </div>
              <div className="field">
                <label>Initials {form.name&&!initialsEdited&&<span style={{color:"#999",marginLeft:6,fontSize:"0.68rem"}}>— suggested</span>}</label>
                <div style={{position:"relative"}}>
                  <input value={form.initials} onChange={e=>handleInitialsChange(e.target.value)} placeholder="e.g. AC" maxLength={3} style={{paddingRight:42}} />
                  <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:24,height:24,borderRadius:"50%",background:form.initials?"rgba(170,255,0,0.12)":"#1a1a1a",border:`1px solid ${form.initials?ACCENT:"#2a2a2a"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",fontWeight:700,color:form.initials?ACCENT:"#444"}}>{form.initials||"?"}</div>
                </div>
              </div>
              <div className="field">
                <label>Gender</label>
                <div style={{display:"flex",gap:8}}>
                  {GENDER_OPTS.map(opt=>(
                    <button key={opt.value} className={`player-chip ${form.gender===opt.value?"selected":""}`}
                      style={{flex:1,textAlign:"center",padding:"8px 6px"}} onClick={()=>setField("gender",opt.value)}>
                      <span style={{marginRight:4}}>{opt.icon}</span>{opt.label}
                    </button>
                  ))}
                </div>
              </div>
              <div className="field">
                <label>DUPR <span style={{color:"#999",fontSize:"0.68rem",marginLeft:4}}>— optional</span></label>
                <input value={form.dupr} onChange={e=>setField("dupr",e.target.value)} placeholder="e.g. 4.25" onKeyDown={e=>e.key==="Enter"&&handleAdd()} />
              </div>
            </div>
            <div style={{marginTop:16}}><button className="btn btn-primary" onClick={handleAdd}>Add Player</button></div>
          </div>
          {players.length===0 ? (
            <div className="empty-state"><div className="icon">👤</div>No players yet.</div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Player</th><th>Gender</th><th>Played</th><th>Win Rate</th><th></th></tr></thead>
                <tbody>
                  {[...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p => {
                    const s = playerStats[p.id]||{played:0,wins:0};
                    const wr = s.played ? Math.round((s.wins/s.played)*100) : 0;
                    const di = p.initials||initials(p.name);
                    const g  = gLabel(p.gender);
                    const isEditing = editingId===p.id;
                    return (
                      <tr key={p.id} style={{background:isEditing?"rgba(170,255,0,0.03)":"transparent"}}>
                        <td>
                          {isEditing ? (
                            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                              <input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} placeholder="Full name"
                                style={{background:"#0f0f0f",border:`1px solid ${ACCENT}`,borderRadius:6,color:"#e8e8e8",fontFamily:"DM Sans,sans-serif",fontSize:"0.85rem",padding:"6px 10px",width:140}}
                                onKeyDown={e=>{if(e.key==="Enter")saveEdit(p.id);if(e.key==="Escape")cancelEdit();}} autoFocus />
                              <input value={editForm.initials} onChange={e=>setEditForm(f=>({...f,initials:e.target.value.toUpperCase().slice(0,3)}))} placeholder="Initials" maxLength={3}
                                style={{background:"#0f0f0f",border:`1px solid ${ACCENT}44`,borderRadius:6,color:ACCENT,fontFamily:"DM Sans,sans-serif",fontSize:"0.85rem",padding:"6px 10px",width:80}}
                                onKeyDown={e=>{if(e.key==="Enter")saveEdit(p.id);if(e.key==="Escape")cancelEdit();}} />
                              <input value={editForm.dupr} onChange={e=>setEditForm(f=>({...f,dupr:e.target.value}))} placeholder="DUPR"
                                style={{background:"#0f0f0f",border:"1px solid #2a2a2a",borderRadius:6,color:"#e8e8e8",fontFamily:"DM Sans,sans-serif",fontSize:"0.85rem",padding:"6px 10px",width:80}}
                                onKeyDown={e=>{if(e.key==="Enter")saveEdit(p.id);if(e.key==="Escape")cancelEdit();}} />
                            </div>
                          ) : (
                            <div className="player-name-cell">
                              <div className="avatar">{di}</div>
                              <div><div>{p.name}</div><div style={{fontSize:"0.72rem",color:"#999"}}>{di}{p.dupr?` · DUPR ${p.dupr}`:""}</div></div>
                            </div>
                          )}
                        </td>
                        <td><span style={{fontSize:"0.85rem",color:p.gender==="M"?ACCENT2:"#ff80c8"}}>{g.icon} {g.label}</span></td>
                        <td>{s.played}</td>
                        <td>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:"0.85rem",minWidth:36}}>{wr}%</span>
                            <div className="win-rate-bar" style={{flex:1,minWidth:60}}><div className="win-rate-fill" style={{width:`${wr}%`}} /></div>
                          </div>
                        </td>
                        <td>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {isEditing ? (
                              <>
                                <button className="btn btn-primary btn-sm" onClick={()=>saveEdit(p.id)}>✓</button>
                                <button className="btn btn-secondary btn-sm" onClick={cancelEdit}>✕</button>
                              </>
                            ) : (
                              <>
                                <button className="btn btn-secondary btn-sm" onClick={()=>startEdit(p)} style={{fontSize:"0.72rem"}}>✏️ Edit</button>
                                <button className="btn btn-danger btn-sm" onClick={()=>onRemove(p.id)}>Remove</button>
                              </>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // LOG MATCH — tabbed: Friendly | Tournament
    // ════════════════════════════════════════════════════════════════════════
    function LogMatch({ players, onAdd }) {
      const [subTab, setSubTab] = useState("friendly");
      return (
        <div>
          <div className="section-title">LOG <span>MATCH</span></div>
          <div className="tabs-inner">
            <button className={`tab-btn ${subTab==="friendly"?"active":""}`} onClick={()=>setSubTab("friendly")}>🏓 Friendly Session</button>
            <button className={`tab-btn tab-tourn ${subTab==="tournament"?"active":""}`} onClick={()=>setSubTab("tournament")}>🏆 Tournament Entry</button>
          </div>
          {subTab==="friendly"   && <BulkSessionForm players={players} onAdd={onAdd} />}
          {subTab==="tournament" && <TournamentForm players={players} onAdd={onAdd} />}
        </div>
      );
    }

    // ── Friendly bulk session form ────────────────────────────────────────────
    function BulkSessionForm({ players, onAdd }) {
      const [header, setHeader] = useState({ date:new Date().toISOString().slice(0,10), opponent:"", notes:"" });
      const [counts, setCounts] = useState({ MD:0, WD:0, XD:0 });
      const [rows,   setRows]   = useState([]);
      const [generated, setGen] = useState(false);
      const [err, setErr]       = useState("");
      const [success, setSucc]  = useState(0);

      const setH = (k,v) => setHeader(h=>({...h,[k]:v}));
      const setCount = (cat, raw) => {
        const v = Math.max(0, Math.min(20, parseInt(raw)||0));
        setCounts(c=>({...c,[cat]:v}));
      };
      const totalGames = Object.values(counts).reduce((s,n)=>s+n,0);

      const handleGenerate = () => {
        if (totalGames===0) { setErr("Enter at least 1 game."); return; }
        setErr("");
        const nr = [];
        CATEGORIES.forEach(cat => { for(let i=0;i<counts[cat.key];i++) nr.push(emptyBulkRow(cat.key)); });
        setRows(nr); setGen(true);
      };

      const setRow = (id,k,v) => setRows(rs=>rs.map(r=>r._id===id?{...r,[k]:v}:r));
      const addRow = catKey  => setRows(rs=>[...rs, emptyBulkRow(catKey)]);
      const removeRow = id   => setRows(rs=>rs.filter(r=>r._id!==id));

      const catSummary = catKey => {
        const cr = rows.filter(r=>r.category===catKey);
        return { total:cr.length, wins:cr.filter(r=>r.winner==="team1").length, losses:cr.filter(r=>r.winner==="team2").length, filled:cr.filter(r=>r.player1).length };
      };

      const validate = () => {
        if (!header.opponent.trim()) return "Please enter the opponent team name.";
        const active = rows.filter(r=>r.player1);
        if (active.length===0) return "Fill in at least one row.";
        for (const r of active) {
          const cat = CAT_MAP[r.category];
          if (!r.player2) return `${cat?.label||r.category} row: select a second player.`;
          if (!r.score.trim()) return `${cat?.label||r.category} row: score is required.`;
        }
        return null;
      };

      const handleSave = () => {
        const e = validate(); if (e) { setErr(e); return; }
        setErr("");
        const active = rows.filter(r=>r.player1);
        active.forEach(r => {
          const cat = CAT_MAP[r.category];
          onAdd({ date:header.date, type:"friendly", format:cat?.fmt||"doubles",
            tournamentName:"", category:r.category, round:r.category,
            team1: [r.player1, r.player2].filter(Boolean),
            team2Label:header.opponent,
            team2Player1:r.oppPlayer1||"", team2Player2:r.oppPlayer2||"",
            score:r.score, winner:r.winner, notes:r.notes });
        });
        setSucc(active.length);
        setRows([]); setGen(false); setCounts({MD:0,WD:0,XD:0}); setHeader(h=>({...h,opponent:"",notes:""}));
        setTimeout(()=>setSucc(0),5000);
      };

      const filledTotal = rows.filter(r=>r.player1).length;
      const winsTotal   = rows.filter(r=>r.winner==="team1").length;
      const lossTotal   = rows.filter(r=>r.winner==="team2").length;

      return (
        <div>
          {success>0 && <div className="alert alert-success">✓ {success} match{success!==1?"es":""} saved!</div>}
          {err && <div className="alert alert-error">{err}</div>}

          <div className="form-section">
            <h3><span style={{color:"#999",fontFamily:"DM Sans",fontSize:"0.72rem",fontWeight:500,letterSpacing:"1px",textTransform:"uppercase",marginRight:10}}>Step 1</span>Session Details</h3>
            <div className="form-grid">
              <div className="field"><label>Date</label><input type="date" value={header.date} onChange={e=>setH("date",e.target.value)} /></div>
              <div className="field"><label>Opponent Team</label><input value={header.opponent} onChange={e=>setH("opponent",e.target.value)} placeholder="e.g. Club Red" /></div>
              <div className="field"><label>Session Notes</label><input value={header.notes} onChange={e=>setH("notes",e.target.value)} placeholder="optional…" /></div>
            </div>
          </div>

          <div className="form-section">
            <h3><span style={{color:"#999",fontFamily:"DM Sans",fontSize:"0.72rem",fontWeight:500,letterSpacing:"1px",textTransform:"uppercase",marginRight:10}}>Step 2</span>Number of Games per Category</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:20}}>
              {CATEGORIES.map(cat=>(
                <div key={cat.key} style={{background:"#0f0f0f",border:`1px solid ${counts[cat.key]>0?cat.color+"44":"#222"}`,borderRadius:10,padding:14,textAlign:"center",transition:"border-color 0.2s"}}>
                  <div style={{fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1.2px",color:cat.color,marginBottom:6,fontWeight:600}}>{cat.key}</div>
                  <div style={{fontSize:"0.7rem",color:"#999",marginBottom:10}}>{cat.label}</div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <button onClick={()=>setCount(cat.key,counts[cat.key]-1)} style={{width:26,height:26,borderRadius:6,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1rem"}}>−</button>
                    <input type="number" min="0" max="20" value={counts[cat.key]} onChange={e=>setCount(cat.key,e.target.value)}
                      style={{width:44,textAlign:"center",background:"#0f0f0f",border:`1px solid ${counts[cat.key]>0?cat.color+"66":"#2a2a2a"}`,borderRadius:6,color:counts[cat.key]>0?cat.color:"#ccc",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.3rem",padding:"3px 0"}} />
                    <button onClick={()=>setCount(cat.key,counts[cat.key]+1)} style={{width:26,height:26,borderRadius:6,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1rem"}}>+</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <button className="btn btn-primary" onClick={handleGenerate} disabled={totalGames===0} style={{opacity:totalGames===0?0.4:1}}>
                {generated?"↺ Regenerate Scoresheet":"Generate Scoresheet →"}
              </button>
              {totalGames>0&&<span style={{fontSize:"0.8rem",color:"#999"}}>
                {totalGames} total
                {CATEGORIES.filter(c=>counts[c.key]>0).map(c=>(
                  <span key={c.key} style={{color:c.color,marginLeft:10}}>{c.key}×{counts[c.key]}</span>
                ))}
              </span>}
            </div>
          </div>

          {generated&&rows.length>0&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div>
                  <span style={{color:"#999",fontFamily:"DM Sans",fontSize:"0.72rem",fontWeight:500,letterSpacing:"1px",textTransform:"uppercase",marginRight:10}}>Step 3</span>
                  <span style={{fontFamily:"Bebas Neue",fontSize:"1.3rem",letterSpacing:"1px"}}>Fill in Scores</span>
                </div>
                {filledTotal>0&&<div style={{display:"flex",gap:14,fontSize:"0.8rem"}}>
                  <span style={{color:"#999"}}>{filledTotal}/{rows.length} filled</span>
                  <span style={{color:ACCENT}}>↑ {winsTotal}W</span>
                  <span style={{color:"#ff6060"}}>↓ {lossTotal}L</span>
                </div>}
              </div>

              {CATEGORIES.filter(cat=>rows.filter(r=>r.category===cat.key).length>0).map(cat=>{
                const catRows = rows.filter(r=>r.category===cat.key);
                const s = catSummary(cat.key);
                return (
                  <div key={cat.key} className="form-section" style={{padding:0,overflow:"hidden",marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"#111",borderBottom:"1px solid #1e1e1e"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{background:cat.color+"18",border:`1px solid ${cat.color}44`,borderRadius:6,padding:"3px 10px",fontFamily:"Bebas Neue",fontSize:"1rem",letterSpacing:"2px",color:cat.color}}>{cat.key}</div>
                        <span style={{color:"#ccc",fontSize:"0.82rem"}}>{cat.label}</span>
                        <span style={{color:"#aaa",fontSize:"0.75rem"}}>{catRows.length} game{catRows.length!==1?"s":""}</span>
                      </div>
                      {s.filled>0&&<div style={{fontSize:"0.75rem",display:"flex",gap:10}}><span style={{color:ACCENT}}>{s.wins}W</span><span style={{color:"#ff6060"}}>{s.losses}L</span></div>}
                    </div>
                    <div className="bulk-table-scroll">
                      <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 1fr 100px 90px 1fr 28px",gap:0,padding:"8px 16px",background:"#0f0f0f",borderBottom:"1px solid #1a1a1a",minWidth:680}}>
                        {["#","Our P1","Our P2","Opp P1","Opp P2","Score","Result","Notes",""].map((h,i)=>(
                          <div key={i} style={{fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"0.8px",color:"#aaa",fontWeight:500}}>{h}</div>
                        ))}
                      </div>
                      {catRows.map((r,idx)=>(
                        <BulkRow2 key={r._id} row={r} idx={idx} cat={cat} players={players}
                          onChange={(k,v)=>setRow(r._id,k,v)} onRemove={()=>removeRow(r._id)} />
                      ))}
                    </div>
                    <div style={{padding:"8px 16px",background:"#0a0a0a",borderTop:"1px solid #1a1a1a"}}>
                      <button className="btn btn-secondary btn-sm" onClick={()=>addRow(cat.key)} style={{fontSize:"0.75rem",color:cat.color,borderColor:cat.color+"33"}}>+ Add {cat.key} row</button>
                    </div>
                  </div>
                );
              })}

              <div style={{display:"flex",alignItems:"center",gap:14,marginTop:8}}>
                <button className="btn btn-primary" style={{fontSize:"0.95rem",padding:"12px 32px",opacity:filledTotal===0?0.4:1}} onClick={handleSave}>
                  Save Session ({filledTotal} match{filledTotal!==1?"es":""}) →
                </button>
                {filledTotal===0&&<span style={{fontSize:"0.78rem",color:"#aaa"}}>Fill in at least one row to save</span>}
              </div>
            </div>
          )}
        </div>
      );
    }

    function BulkRow2({ row, idx, cat, players, onChange, onRemove }) {
      const selStyle = { background:"#0f0f0f", border:"1px solid #252525", borderRadius:6, color:"#e8e8e8", fontFamily:"DM Sans,sans-serif", fontSize:"0.78rem", padding:"5px 6px", width:"100%" };
      const byGender = g => { const f=players.filter(p=>p.gender===g); return f.length>0?f:players; };
      const p1Opts = byGender(cat.g1).filter(p=>p.id!==row.player2);
      const p2Opts = byGender(cat.g2).filter(p=>p.id!==row.player1);
      const rowFilled = !!row.player1;
      return (
        <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 1fr 100px 90px 1fr 28px",gap:5,padding:"7px 16px",borderBottom:"1px solid #141414",alignItems:"center",background:rowFilled?`${cat.color}06`:"transparent",minWidth:680}}>
          <div style={{fontSize:"0.72rem",color:cat.color+"88",textAlign:"center",fontFamily:"Bebas Neue"}}>{idx+1}</div>
          <select style={{...selStyle,borderColor:row.player1?cat.color+"55":"#252525"}} value={row.player1} onChange={e=>onChange("player1",e.target.value)}>
            <option value="">— select —</option>
            {[...p1Opts].sort((a,b)=>a.name.localeCompare(b.name)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select style={{...selStyle,borderColor:row.player2?cat.color+"55":"#252525"}} value={row.player2||""} onChange={e=>onChange("player2",e.target.value)}>
            <option value="">— select —</option>
            {[...p2Opts].sort((a,b)=>a.name.localeCompare(b.name)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <input style={selStyle} value={row.oppPlayer1||""} onChange={e=>onChange("oppPlayer1",e.target.value)} placeholder="Opp P1" />
          <input style={selStyle} value={row.oppPlayer2||""} onChange={e=>onChange("oppPlayer2",e.target.value)} placeholder="Opp P2" />
          <input style={{...selStyle,fontFamily:"Bebas Neue,sans-serif",fontSize:"0.92rem",letterSpacing:"1px",textAlign:"center"}} value={row.score||""} onChange={e=>onChange("score",e.target.value)} placeholder="21-18" />
          <div style={{display:"flex",gap:3}}>
            {[["team1","W",ACCENT],["team2","L","#ff6060"]].map(([val,lbl,col])=>(
              <button key={val} onClick={()=>onChange("winner",val)} style={{flex:1,padding:"4px 0",border:"none",borderRadius:4,cursor:"pointer",fontSize:"0.7rem",fontWeight:700,background:row.winner===val?col+"22":"#1a1a1a",color:row.winner===val?col:"#777",outline:row.winner===val?`1px solid ${col}55`:"none",transition:"all 0.1s"}}>{lbl}</button>
            ))}
          </div>
          <input style={{...selStyle,fontSize:"0.72rem"}} value={row.notes||""} onChange={e=>onChange("notes",e.target.value)} placeholder="Notes…" />
          <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:"#333",fontSize:"0.85rem",padding:0,textAlign:"center",transition:"color 0.15s"}}
            onMouseEnter={e=>e.target.style.color="#ff6060"} onMouseLeave={e=>e.target.style.color="#333"}>✕</button>
        </div>
      );
    }

    // ── Tournament entry form ─────────────────────────────────────────────────
    function TournamentForm({ players, onAdd }) {
      const [header, setHeader] = useState({ name:"", location:"", date:new Date().toISOString().slice(0,10) });
      const [rows, setRows]     = useState([]);
      const [err, setErr]       = useState("");
      const [success, setSucc]  = useState(0);

      const setH = (k,v) => setHeader(h=>({...h,[k]:v}));
      const addRow = () => setRows(rs=>[...rs, emptyTournamentRow()]);
      const setRow = (id,k,v) => setRows(rs=>rs.map(r=>r._id===id?{...r,[k]:v}:r));
      const removeRow = id => setRows(rs=>rs.filter(r=>r._id!==id));

      const validate = () => {
        if (!header.name.trim()) return "Please enter the tournament name.";
        if (rows.length===0) return "Add at least one game entry.";
        for (const r of rows) {
          if (!r.player1) return `Category ${r.category}: select at least one player.`;
          const cat = CAT_MAP[r.category];
          if (!r.player2) return `${cat?.label||r.category}: select second player for doubles.`;
          if (!r.score.trim()) return `Please enter score for all rows.`;
        }
        return null;
      };

      const handleSave = () => {
        const e = validate(); if (e) { setErr(e); return; }
        setErr("");
        rows.forEach(r => {
          const cat = CAT_MAP[r.category];
          onAdd({ date:header.date, type:"tournament",
            tournamentName:header.name.trim(),
            tournamentLocation:header.location.trim(),
            category:r.category, round:r.round,
            format:cat?.fmt||"doubles",
            team1: [r.player1, r.player2].filter(Boolean),
            team2Label:r.oppLabel||"",
            team2Player1:"", team2Player2:"",
            score:r.score, winner:r.winner, notes:r.notes });
        });
        setSucc(rows.length);
        setRows([]); setHeader(h=>({...h,name:"",location:""}));
        setTimeout(()=>setSucc(0),5000);
      };

      const selStyle = { background:"#0f0f0f", border:"1px solid #252525", borderRadius:6, color:"#e8e8e8", fontFamily:"DM Sans,sans-serif", fontSize:"0.78rem", padding:"6px 8px", width:"100%" };

      return (
        <div>
          {success>0 && <div className="alert alert-success">🏆 {success} tournament game{success!==1?"s":""} saved!</div>}
          {err && <div className="alert alert-error">{err}</div>}

          {/* Tournament header */}
          <div className="form-section" style={{borderColor:"rgba(255,200,0,0.2)"}}>
            <h3 style={{color:"#ffc800"}}>
              <span style={{color:"#999",fontFamily:"DM Sans",fontSize:"0.72rem",fontWeight:500,letterSpacing:"1px",textTransform:"uppercase",marginRight:10}}>Step 1</span>
              Tournament Details
            </h3>
            <div className="form-grid">
              <div className="field" style={{gridColumn:"span 2"}}>
                <label>Tournament Name <span style={{color:"#ff6060",fontSize:"0.65rem"}}>required</span></label>
                <input value={header.name} onChange={e=>setH("name",e.target.value)} placeholder="e.g. Selangor State Open 2025" />
              </div>
              <div className="field">
                <label>Location <span style={{color:"#999",fontSize:"0.65rem"}}>optional</span></label>
                <input value={header.location} onChange={e=>setH("location",e.target.value)} placeholder="e.g. Axiata Arena, KL" />
              </div>
              <div className="field">
                <label>Date</label>
                <input type="date" value={header.date} onChange={e=>setH("date",e.target.value)} />
              </div>
            </div>
          </div>

          {/* Game rows */}
          <div className="form-section" style={{padding:0,overflow:"hidden",borderColor:"rgba(255,200,0,0.15)"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid #1e1e1e",background:"#111",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <span style={{color:"#999",fontFamily:"DM Sans",fontSize:"0.72rem",fontWeight:500,letterSpacing:"1px",textTransform:"uppercase",marginRight:10}}>Step 2</span>
                <span style={{fontFamily:"Bebas Neue",fontSize:"1.2rem",letterSpacing:"1px",color:"#ffc800"}}>Game Entries</span>
              </div>
              <button className="btn btn-secondary btn-sm" onClick={addRow} style={{color:"#ffc800",borderColor:"rgba(255,200,0,0.3)"}}>+ Add Game</button>
            </div>

            {rows.length===0 ? (
              <div style={{padding:"40px 20px",textAlign:"center",color:"#555",fontSize:"0.88rem"}}>
                <div style={{fontSize:"2rem",marginBottom:10}}>🏆</div>
                Click "Add Game" above to log a match from this tournament.
              </div>
            ) : (
              <>
                {/* Column headers */}
                <div className="table-scroll" style={{overflowX:"auto"}}>
                  <div style={{display:"grid",gridTemplateColumns:"80px 120px 1fr 1fr 1fr 90px 72px 1fr 30px",gap:5,padding:"8px 16px",background:"#0c0c0c",borderBottom:"1px solid #1a1a1a",minWidth:780}}>
                    {["Cat","Round","Our P1","Our P2","Opponent","Score","W / L","Notes",""].map((h,i)=>(
                      <div key={i} style={{fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"0.8px",color:"#aaa",fontWeight:500}}>{h}</div>
                    ))}
                  </div>
                  {rows.map((r,idx)=>{
                    const cat = CAT_MAP[r.category]||CATEGORIES[2];
                    const byGender = g => { const f=players.filter(p=>p.gender===g); return f.length>0?f:players; };
                    const p1Pool = byGender(cat.g1).filter(p=>p.id!==r.player2);
                    const p2Pool = byGender(cat.g2||cat.g1).filter(p=>p.id!==r.player1);
                    return (
                      <div key={r._id} style={{display:"grid",gridTemplateColumns:"80px 120px 1fr 1fr 1fr 90px 72px 1fr 30px",gap:5,padding:"7px 16px",borderBottom:"1px solid #141414",alignItems:"center",background:`${cat.color}05`,minWidth:780}}>
                        {/* Category */}
                        <select value={r.category} onChange={e=>setRow(r._id,"category",e.target.value)} style={{...selStyle,color:cat.color,fontWeight:700,borderColor:cat.color+"44"}}>
                          {CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.key}</option>)}
                        </select>
                        {/* Round */}
                        <select value={r.round} onChange={e=>setRow(r._id,"round",e.target.value)} style={{...selStyle,borderColor:"rgba(255,200,0,0.25)"}}>
                          {TOURNAMENT_ROUNDS.map(rnd=><option key={rnd.key} value={rnd.key}>{rnd.label}</option>)}
                        </select>
                        {/* Our P1 */}
                        <select value={r.player1} onChange={e=>setRow(r._id,"player1",e.target.value)} style={{...selStyle,borderColor:r.player1?cat.color+"55":"#252525"}}>
                          <option value="">— select —</option>
                          {[...p1Pool].sort((a,b)=>a.name.localeCompare(b.name)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                        {/* Our P2 */}
                        <select value={r.player2||""} onChange={e=>setRow(r._id,"player2",e.target.value)} style={{...selStyle,borderColor:r.player2?cat.color+"55":"#252525"}}>
                          <option value="">— select —</option>
                          {[...p2Pool].sort((a,b)=>a.name.localeCompare(b.name)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                        {/* Opponent label */}
                        <input value={r.oppLabel||""} onChange={e=>setRow(r._id,"oppLabel",e.target.value)} placeholder="Opponent / pair…" style={selStyle} />
                        {/* Score */}
                        <input value={r.score||""} onChange={e=>setRow(r._id,"score",e.target.value)} placeholder="21-18" style={{...selStyle,fontFamily:"Bebas Neue,sans-serif",fontSize:"0.92rem",letterSpacing:"1px",textAlign:"center"}} />
                        {/* W/L toggle */}
                        <div style={{display:"flex",gap:3}}>
                          {[["team1","W",ACCENT],["team2","L","#ff6060"]].map(([val,lbl,col])=>(
                            <button key={val} onClick={()=>setRow(r._id,"winner",val)} style={{flex:1,padding:"5px 0",border:"none",borderRadius:4,cursor:"pointer",fontSize:"0.72rem",fontWeight:700,background:r.winner===val?col+"22":"#1a1a1a",color:r.winner===val?col:"#777",outline:r.winner===val?`1px solid ${col}55`:"none",transition:"all 0.1s"}}>{lbl}</button>
                          ))}
                        </div>
                        {/* Notes */}
                        <input value={r.notes||""} onChange={e=>setRow(r._id,"notes",e.target.value)} placeholder="Notes…" style={{...selStyle,fontSize:"0.72rem"}} />
                        {/* Remove */}
                        <button onClick={()=>removeRow(r._id)} style={{background:"none",border:"none",cursor:"pointer",color:"#333",fontSize:"0.85rem",padding:0,textAlign:"center",transition:"color 0.15s"}}
                          onMouseEnter={e=>e.target.style.color="#ff6060"} onMouseLeave={e=>e.target.style.color="#333"}>✕</button>
                      </div>
                    );
                  })}
                </div>

                {/* Summary + save */}
                <div style={{padding:"12px 18px",borderTop:"1px solid #1e1e1e",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",background:"#111"}}>
                  <button className="btn btn-primary" onClick={handleSave} style={{opacity:rows.length===0?0.4:1}}>
                    🏆 Save {rows.length} Tournament Game{rows.length!==1?"s":""}
                  </button>
                  <div style={{fontSize:"0.78rem",color:"#999"}}>
                    <span style={{color:ACCENT}}>{rows.filter(r=>r.winner==="team1").length}W</span>
                    <span style={{margin:"0 4px",color:"#444"}}>–</span>
                    <span style={{color:"#ff6060"}}>{rows.filter(r=>r.winner==="team2").length}L</span>
                    <span style={{marginLeft:8}}>{rows.length} game{rows.length!==1?"s":""} entered</span>
                  </div>
                </div>
              </>
            )}
          </div>

          {/* Quick tips */}
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 18px",marginTop:4,fontSize:"0.78rem",color:"#666",lineHeight:1.6}}>
            <span style={{color:"#ffc800",fontWeight:600,marginRight:8}}>Tips</span>
            Score format: <span style={{color:"#999"}}>21-18</span> for 1 game, <span style={{color:"#999"}}>21-18, 18-21, 15-12</span> for a multi-game match.
            Separate sets with commas. You can log multiple rounds of the same tournament by adding multiple rows.
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // HISTORY
    // ════════════════════════════════════════════════════════════════════════
    function History({ matches, players, onRemove, onUpdate, onAdd }) {
      const playerMap = getPlayerMap(players);
      const [view, setView]           = useState("sessions"); // "sessions" | "tournaments" | "all"
      const [filterPlayer, setFP]     = useState("all");
      const [filterOpponent, setFO]   = useState("all");
      const [sortBy, setSB]           = useState("date_desc");
      const [expandedKey, setEK]      = useState(null);
      const [expandedTourn, setET]    = useState(null);
      const [showTournaments, setST]  = useState(false);

      const catColor = {MD:ACCENT2,WD:"#ff80c8",XD:"#FF9500"};

      const opponents = useMemo(()=>{
        const seen = new Set();
        matches.filter(m=>m.type!=="tournament").forEach(m=>{const o=(m.team2Label||"").trim();if(o)seen.add(o);});
        return [...seen].sort();
      },[matches]);

      const friendlySessions = useMemo(()=>{
        const map = {};
        matches.filter(m=>m.type!=="tournament").forEach(m=>{
          const opp=(m.team2Label||"Unknown").trim();
          const key=`${m.date}||${opp}`;
          if(!map[key]) map[key]={key,date:m.date,opponent:opp,games:[]};
          map[key].games.push(m);
        });
        let list=Object.values(map);
        if(filterPlayer!=="all") list=list.filter(s=>s.games.some(m=>m.team1.includes(filterPlayer)));
        list.sort((a,b)=>sortBy==="date_desc"?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
        return list;
      },[matches,filterPlayer,sortBy]);

      const tournamentGroups = useMemo(()=>{
        const map = {};
        matches.filter(m=>m.type==="tournament").forEach(m=>{
          const key=(m.tournamentName||"Unknown").trim();
          if(!map[key]) map[key]={key,name:key,location:m.tournamentLocation||"",dates:[],games:[]};
          map[key].dates.push(m.date); map[key].games.push(m);
        });
        let list=Object.values(map);
        if(filterPlayer!=="all") list=list.filter(t=>t.games.some(m=>m.team1.includes(filterPlayer)));
        list.sort((a,b)=>{
          const la=Math.max(...a.dates.map(d=>new Date(d)));
          const lb=Math.max(...b.dates.map(d=>new Date(d)));
          return sortBy==="date_desc"?lb-la:la-lb;
        });
        return list.map(t=>{
          const wins=t.games.filter(m=>m.winner==="team1").length;
          const total=t.games.length;
          const pct=total?Math.round((wins/total)*100):0;
          const bestRound=t.games.reduce((best,m)=>{
            const ro=ROUND_ORDER[m.round]??-1;
            return ro>(ROUND_ORDER[best]??-1)?m.round:best;
          },"");
          const isChampion=t.games.some(m=>m.round==="final"&&m.winner==="team1");
          return {...t,wins,total,pct,bestRound,isChampion,date:t.dates.sort().pop()};
        });
      },[matches,filterPlayer,sortBy]);

      const allMatches = useMemo(()=>{
        let list = showTournaments ? [...matches] : matches.filter(m=>m.type!=="tournament");
        if(filterPlayer!=="all") list=list.filter(m=>m.team1.includes(filterPlayer));
        if(filterOpponent!=="all") list=list.filter(m=>(m.team2Label||"").trim()===filterOpponent);
        list.sort((a,b)=>sortBy==="date_desc"?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
        return list;
      },[matches,filterPlayer,filterOpponent,sortBy,showTournaments]);

      return (
        <div>
          <div className="section-title">MATCH <span>HISTORY</span></div>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <button className={`tab-btn ${view==="sessions"?"active":""}`} onClick={()=>setView("sessions")}>📋 Friendly Sessions</button>
            <button className={`tab-btn tab-tourn ${view==="tournaments"?"active":""}`} onClick={()=>setView("tournaments")}>🏆 Tournaments</button>
            <button className={`tab-btn ${view==="all"?"active":""}`} onClick={()=>setView("all")}>All Records</button>
            <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <select value={filterPlayer} onChange={e=>setFP(e.target.value)}
                style={{background:"#161616",border:"1px solid #252525",borderRadius:8,color:"#ccc",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"7px 12px"}}>
                <option value="all">All Players</option>
                {[...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              {view==="all"&&(
                <select value={filterOpponent} onChange={e=>setFO(e.target.value)}
                  style={{background:"#161616",border:"1px solid #252525",borderRadius:8,color:"#ccc",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"7px 12px"}}>
                  <option value="all">All Opponents</option>
                  {opponents.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              )}
              <select value={sortBy} onChange={e=>setSB(e.target.value)}
                style={{background:"#161616",border:"1px solid #252525",borderRadius:8,color:"#ccc",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"7px 12px"}}>
                <option value="date_desc">Newest First</option>
                <option value="date_asc">Oldest First</option>
              </select>
              {view==="all"&&(
                <button onClick={()=>setST(v=>!v)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",
                    border:`1px solid ${showTournaments?"rgba(255,200,0,0.4)":"#252525"}`,
                    borderRadius:8,background:showTournaments?"rgba(255,200,0,0.08)":"#161616",
                    cursor:"pointer",transition:"all 0.2s",flexShrink:0}}>
                  <div style={{width:24,height:14,borderRadius:7,background:showTournaments?"#ffc800":"#333",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:showTournaments?12:2,transition:"left 0.2s"}} />
                  </div>
                  <span style={{fontSize:"0.75rem",color:showTournaments?"#ffc800":"#666",fontWeight:600,whiteSpace:"nowrap"}}>
                    🏆 Tournaments
                  </span>
                </button>
              )}
            </div>
          </div>

          {/* FRIENDLY SESSIONS */}
          {view==="sessions"&&(
            friendlySessions.length===0
              ? <div className="empty-state"><div className="icon">📋</div>No friendly sessions yet.</div>
              : <div className="table-wrap table-scroll">
                  <table>
                    <thead><tr>
                      <th>Date</th><th>Opponent</th>
                      <th style={{textAlign:"center"}}>Total</th>
                      <th style={{textAlign:"center",color:ACCENT2}}>MD</th>
                      <th style={{textAlign:"center",color:"#ff80c8"}}>WD</th>
                      <th style={{textAlign:"center",color:"#FF9500"}}>XD</th>
                      <th style={{textAlign:"center"}}>Win %</th><th>Result</th><th></th>
                    </tr></thead>
                    <tbody>
                      {friendlySessions.map(s=>{
                        const wins=s.games.filter(m=>m.winner==="team1").length;
                        const losses=s.games.filter(m=>m.winner==="team2").length;
                        const pct=s.games.length?Math.round((wins/s.games.length)*100):0;
                        const rc=pct>=60?ACCENT:pct>=40?"#ffc800":"#ff6060";
                        const isOpen=expandedKey===s.key;
                        const catCounts={};
                        s.games.forEach(m=>{const c=matchCategory(m);if(!catCounts[c])catCounts[c]={w:0,l:0};if(m.winner==="team1")catCounts[c].w++;else if(m.winner==="team2")catCounts[c].l++;});
                        return (
                          <SessionBlock key={s.key} session={s} players={players} playerMap={playerMap}
                            wins={wins} losses={losses} pct={pct} rc={rc} catCounts={catCounts}
                            isOpen={isOpen} onToggle={()=>setEK(isOpen?null:s.key)}
                            onUpdate={onUpdate} onRemove={onRemove} onAdd={onAdd} catColor={catColor} />
                        );
                      })}
                    </tbody>
                  </table>
                </div>
          )}

          {/* TOURNAMENTS */}
          {view==="tournaments"&&(
            tournamentGroups.length===0
              ? <div className="empty-state"><div className="icon">🏆</div>No tournament records yet.</div>
              : <div>
                  {tournamentGroups.map(t=>(
                    <TournamentHistoryBlock key={t.key} tourn={t} players={players} playerMap={playerMap}
                      catColor={catColor} isOpen={expandedTourn===t.key}
                      onToggle={()=>setET(expandedTourn===t.key?null:t.key)}

          {/* ALL RECORDS */}
          {view==="all"&&(

                    <thead><tr>

                                : <span style={{fontSize:"0.72rem",color:"#888"}}>Friendly</span>}
                            </td>
                            <td><span style={{color:col,fontFamily:"Bebas Neue",fontSize:"0.9rem",letterSpacing:"1px"}}>{cat}</span>
                              {m.type==="tournament"&&m.round&&<div style={{fontSize:"0.65rem",color:"#999",marginTop:1}}>{roundLabel(m.round)}</div>}
                            </td>
                            <td style={{fontSize:"0.85rem"}}>{t1}</td>
                            <td style={{color:"#aaa",fontSize:"0.82rem"}}>{m.team2Label||"—"}</td>
                            <td style={{fontFamily:"Bebas Neue",fontSize:"1rem",letterSpacing:"1px"}}>{m.score||"—"}</td>

                            <td style={{color:"#999",fontSize:"0.78rem",maxWidth:150}}>{m.notes||"—"}</td>
                          </tr>

      );
    }

    // ── Friendly SessionBlock (expandable row) ────────────────────────────────
    const CAT_ORDER2 = {MD:0,WD:1,XD:2};
    const sortByCat = arr => [...arr].sort((a,b)=>(CAT_ORDER2[matchCategory(a)]??99)-(CAT_ORDER2[matchCategory(b)]??99));

    function SessionBlock({ session, players, playerMap, wins, losses, pct, rc, catCounts, isOpen, onToggle, onUpdate, onRemove, onAdd, catColor }) {
      const [sessionDate, setSD]     = useState(session.date);
      const [sessionOpp, setSO]      = useState(session.opponent);
      const [rows, setRows]          = useState(()=>sortByCat(session.games).map(m=>({...m,_editing:false})));
      const [dirty, setDirty]        = useState(false);
      const [saved, setSaved]        = useState(false);
      // Ref keeps dirty in sync for the useEffect closure, avoiding stale-closure resets
      const dirtyRef = React.useRef(false);

      const markDirty = () => { setDirty(true); dirtyRef.current = true; };

      useEffect(()=>{
        if(!dirtyRef.current){
          setRows(sortByCat(session.games).map(m=>({...m,_editing:false})));
          setSD(session.date); setSO(session.opponent);
        }
      },[session.games]);

      // Update a single field on a row
      const setRow=(id,k,v)=>{setRows(rs=>rs.map(r=>r.id===id?{...r,[k]:v}:r));markDirty();};
      // Update multiple fields at once (used for category changes)
      const setRowFields=(id,fields)=>{setRows(rs=>rs.map(r=>r.id===id?{...r,...fields}:r));markDirty();};

      const addRow=()=>{setRows(rs=>[...rs,{id:genId(),date:sessionDate,type:"friendly",format:"mixed_doubles",category:"XD",round:"XD",team1:[],team2Label:sessionOpp,score:"",winner:"team1",notes:"",_isNew:true}]);markDirty();};
      const removeRow=(id,isNew)=>{if(!isNew)onRemove(id);setRows(rs=>rs.filter(r=>r.id!==id));markDirty();};
      const saveAll=()=>{
        rows.forEach(r=>{
          const{_isNew,_editing,...rest}=r;
          const updated={...rest,date:sessionDate,team2Label:sessionOpp};
          if(_isNew) onAdd({...updated}); else onUpdate(r.id,updated);
        });
        dirtyRef.current = false;
        setDirty(false); setSaved(true); setTimeout(()=>setSaved(false),2500);
      };

      const selStyle={background:"#0f0f0f",border:"1px solid #252525",borderRadius:6,color:"#e8e8e8",fontFamily:"DM Sans,sans-serif",fontSize:"0.78rem",padding:"5px 6px",width:"100%"};

                        <input style={{...selStyle,fontFamily:"Bebas Neue,sans-serif",fontSize:"0.9rem",letterSpacing:"1px",textAlign:"center"}} value={r.score||""} onChange={e=>setRow(r.id,"score",e.target.value)} placeholder="21-18" />

                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 18px",flexWrap:"wrap"}}>
                  <button className="btn btn-primary btn-sm" onClick={saveAll} style={{opacity:dirty?1:0.5}}>✓ Save Changes</button>
                  <button className="btn btn-secondary btn-sm" onClick={addRow} style={{color:ACCENT,borderColor:ACCENT+"33"}}>+ Add Game</button>
                  {!dirty&&<span style={{color:"#aaa",fontSize:"0.75rem"}}>No unsaved changes</span>}
                  {dirty &&<span style={{color:"#ffc800",fontSize:"0.75rem"}}>● Unsaved changes</span>}
                </div>
              </td>
            </tr>
          )}
        </>
      );
    }

    // ── Tournament history block ──────────────────────────────────────────────

        tourn.games.forEach(m => onUpdate(m.id, { tournamentName: trimmed }));

          {/* Expanded content */}

            <div className="tourn-card-body">
