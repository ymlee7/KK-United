    // ════════════════════════════════════════════════════════════════════════
    // STATISTICS
    // ════════════════════════════════════════════════════════════════════════

    // Shared ranking comparator: Wins → Win% → PtsDiff → Sessions
    function rankComparator(a, b) {
      if (b.wins !== a.wins) return b.wins - a.wins;
      const wrA = a.played ? a.wins / a.played : 0;
      const wrB = b.played ? b.wins / b.played : 0;
      if (Math.abs(wrB - wrA) > 1e-9) return wrB - wrA;
      if (b.ptsDiff !== a.ptsDiff) return b.ptsDiff - a.ptsDiff;
      const sA = a.sessions ?? a.friendlySessions ?? 0;
      const sB = b.sessions ?? b.friendlySessions ?? 0;
      return sB - sA;
    }

    function Stats({ players, matches }) {
      const [statsTab, setStatsTab]           = useState("individual");
      const [selectedSession, setSelectedSession] = useState("");
      const [includeTournament, setIncludeTournament] = useState(false);
      const [filterPartnerPlayer, setFPP]     = useState("all");
      const playerMap  = getPlayerMap(players);
      const catColors  = {MS:"#A78BFA",WS:"#F472B6",MD:ACCENT2,WD:"#ff80c8",XD:"#FF9500"};

      // Matches filtered for Friendly-only stats (Individual, Partnerships, Awards)
      const friendlyOnlyMatches = useMemo(() => matches.filter(m => m.type !== "tournament"), [matches]);
      const statsMatches = includeTournament ? matches : friendlyOnlyMatches;

      // ── Individual stats ──────────────────────────────────────────────────
      const individualStats = useMemo(() => {
        const stats = {};
        players.forEach(p => {
          stats[p.id] = { friendlySessions: new Set(), tournamentSessions: new Set(), played:0, wins:0, losses:0, ptsDiff:0 };
        });
        statsMatches.forEach(m => {
          m.team1.forEach(id => {
            if (!stats[id]) return;
            stats[id].played++;
            if (m.type === "tournament") {
              stats[id].tournamentSessions.add(m.tournamentName||"?");
            } else {
              stats[id].friendlySessions.add(`${m.date}||${(m.team2Label||"").trim()}`);
            }
            if (m.winner==="team1") stats[id].wins++;
            else if (m.winner==="team2") stats[id].losses++;
            stats[id].ptsDiff += parsePointsDiff(m.score);
          });
        });
        return players.map(p => {
          const s = stats[p.id];
          const friendlySessions = s.friendlySessions.size;
          const sessions = friendlySessions + s.tournamentSessions.size;
          return {
            ...p,
            friendlySessions, sessions,
            played: s.played, wins: s.wins, losses: s.losses, ptsDiff: s.ptsDiff,
            winRate: s.played ? Math.round((s.wins / s.played) * 100) : 0,
          };
        }).sort(rankComparator);
      }, [players, statsMatches]);

      // ── Partnership stats ─────────────────────────────────────────────────
      const partnershipStats = useMemo(() => {
        const pairs = {};
        statsMatches.filter(m => m.team1.length === 2).forEach(m => {
          const [a,b] = [...m.team1].sort(); const key = `${a}|${b}`;
          if (!pairs[key]) pairs[key] = { ids:[a,b], sessionSet:new Set(), played:0, wins:0, losses:0, ptsDiff:0 };
          pairs[key].played++;
          if (m.winner==="team1") pairs[key].wins++; else if (m.winner==="team2") pairs[key].losses++;
          pairs[key].ptsDiff += parsePointsDiff(m.score);
          const sessKey = m.type==="tournament" ? (m.tournamentName||"?") : `${m.date}||${(m.team2Label||"").trim()}`;
          pairs[key].sessionSet.add(sessKey);
        });
        return Object.values(pairs)
          .map(p => ({ ...p, sessions: p.sessionSet.size }))
          .sort(rankComparator);
      }, [statsMatches]);

      // ── Head-to-head ──────────────────────────────────────────────────────
      const h2h = useMemo(() => {
        const opp = {};
        matches.filter(m => m.type !== "tournament").forEach(m => {
          const key = (m.team2Label||"Unknown").trim();
          if (!opp[key]) opp[key] = { opp:key, played:0, wins:0, losses:0, sessionSet:new Set() };
          opp[key].played++;
          if (m.winner==="team1") opp[key].wins++; else if (m.winner==="team2") opp[key].losses++;
          opp[key].sessionSet.add(`${m.date}||${key}`);
        });
        return Object.values(opp)
          .map(r => ({ ...r, sessions: r.sessionSet.size }))
          .sort((a,b) => {
            if (b.wins !== a.wins) return b.wins - a.wins;
            const wrA = a.played ? a.wins/a.played : 0, wrB = b.played ? b.wins/b.played : 0;
            return wrB - wrA;
          });
      }, [matches]);

      // ── Session list (friendly only, for session analysis selector) ──────
      const sessionsList = useMemo(() => {
        const map = {};
        matches.filter(m => m.type !== "tournament").forEach(m => {
          const key = `${m.date}||${(m.team2Label||"").trim()}`;
          if (!map[key]) map[key] = { key, date:m.date, opponent:(m.team2Label||"Unknown").trim(), games:[] };
          map[key].games.push(m);
        });
        return Object.values(map).sort((a,b) => new Date(b.date)-new Date(a.date));
      }, [matches]);

      // ── Session analysis detail ───────────────────────────────────────────
      const sessionData = useMemo(() => {
        if (!selectedSession) return null;
        const s = sessionsList.find(s => s.key === selectedSession);
        if (!s) return null;
        const games = s.games;
        const wins   = games.filter(m => m.winner==="team1").length;
        const losses = games.filter(m => m.winner==="team2").length;
        const pct    = games.length ? Math.round((wins/games.length)*100) : 0;

        // By category
        const cats = {};
        CATEGORIES.forEach(c => { cats[c.key] = {w:0,l:0}; });
        games.forEach(m => {
          const c = matchCategory(m); if (!cats[c]) cats[c]={w:0,l:0};
          if (m.winner==="team1") cats[c].w++; else if (m.winner==="team2") cats[c].l++;
        });

        // Pairs — ranked with new comparator
        const pairsMap = {};
        games.forEach(m => {
          if (m.team1.length === 2) {
            const [a,b] = [...m.team1].sort(); const key = `${a}|${b}`;
            if (!pairsMap[key]) pairsMap[key] = { ids:[a,b], played:0, wins:0, losses:0, ptsDiff:0 };
            pairsMap[key].played++;
            if (m.winner==="team1") pairsMap[key].wins++; else if (m.winner==="team2") pairsMap[key].losses++;
            pairsMap[key].ptsDiff += parsePointsDiff(m.score);
          }
        });
        const pairs = Object.values(pairsMap)
          .map(p => ({ ...p, sessions: 1, winRate: p.played ? Math.round((p.wins/p.played)*100) : 0 }))
          .sort(rankComparator);

        // Individuals — ranked with new comparator
        const indMap = {};
        games.forEach(m => {
          m.team1.forEach(id => {
            if (!indMap[id]) indMap[id] = { id, played:0, wins:0, losses:0, ptsDiff:0 };
            indMap[id].played++;
            if (m.winner==="team1") indMap[id].wins++; else if (m.winner==="team2") indMap[id].losses++;
            indMap[id].ptsDiff += parsePointsDiff(m.score);
          });
        });
        const individuals = Object.values(indMap)
          .map(p => ({ ...p, sessions: 1, winRate: p.played ? Math.round((p.wins/p.played)*100) : 0 }))
          .sort(rankComparator);

        const bestCat = CATEGORIES.map(c=>c.key).filter(k => (cats[k]?.w||0)+(cats[k]?.l||0)>0)
          .sort((a,b) => {
            const ta=cats[a].w+cats[a].l, tb=cats[b].w+cats[b].l;
            return (cats[b].w/tb)-(cats[a].w/ta);
          })[0];

        let maxStreak=0, curStreak=0;
        [...games].forEach(m => { if(m.winner==="team1"){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}else curStreak=0; });

        return { ...s, wins, losses, pct, cats, pairs, individuals, bestCat, maxStreak };
      }, [selectedSession, sessionsList]);

      // ── Annual awards ─────────────────────────────────────────────────────
      const yearAwards = useMemo(() => {
        const currentYear = new Date().getFullYear();
        const byYear = {};
        statsMatches.forEach(m => {
          const year = m.date?.slice(0,4); if (!year) return;
          if (!byYear[year]) byYear[year] = [];
          byYear[year].push(m);
        });
        return Object.entries(byYear).sort((a,b)=>b[0]-a[0]).map(([year, games]) => {
          const inProgress = parseInt(year) >= currentYear;
          const maleStats={}, femaleStats={};
          games.forEach(m => {
            m.team1.forEach(id => {
              const p=playerMap[id]; if (!p) return;
              const bucket = p.gender==="M"?maleStats:p.gender==="F"?femaleStats:null;
              if (!bucket) return;
              if (!bucket[id]) bucket[id]={id,played:0,wins:0,losses:0,ptsDiff:0,sessions:1};
              bucket[id].played++; bucket[id].ptsDiff+=parsePointsDiff(m.score);
              if(m.winner==="team1")bucket[id].wins++;else if(m.winner==="team2")bucket[id].losses++;
            });
          });
          const catPairs={MD:{},WD:{},XD:{}};
          games.forEach(m=>{
            const cat=matchCategory(m); const bucket=catPairs[cat];
            if(!bucket||m.team1.length!==2) return;
            const [a,b]=[...m.team1].sort(); const key=`${a}|${b}`;
            if(!bucket[key]) bucket[key]={ids:[a,b],played:0,wins:0,losses:0,ptsDiff:0,sessions:1};
            bucket[key].played++; bucket[key].ptsDiff+=parsePointsDiff(m.score);
            if(m.winner==="team1")bucket[key].wins++;else if(m.winner==="team2")bucket[key].losses++;
          });
          return {
            year, inProgress,
            malePlayers:   Object.values(maleStats).sort(rankComparator),
            femalePlayers: Object.values(femaleStats).sort(rankComparator),
            mdPairs: Object.values(catPairs.MD).sort(rankComparator),
            wdPairs: Object.values(catPairs.WD).sort(rankComparator),
            xdPairs: Object.values(catPairs.XD).sort(rankComparator),
          };
        });
      }, [statsMatches, playerMap]);

      // ── Tournament stats ──────────────────────────────────────────────────
      const tournamentStats = useMemo(() => {
        // Per-player tournament performance
        const perPlayer = {};
        players.forEach(p => { perPlayer[p.id] = { played:0, wins:0, losses:0, ptsDiff:0, sessions:new Set() }; });
        matches.filter(m=>m.type==="tournament").forEach(m => {
          m.team1.forEach(id => {
            if (!perPlayer[id]) return;
            perPlayer[id].played++;
            if(m.winner==="team1")perPlayer[id].wins++;else if(m.winner==="team2")perPlayer[id].losses++;
            perPlayer[id].ptsDiff += parsePointsDiff(m.score);
            perPlayer[id].sessions.add(m.tournamentName||"?");
          });
        });
        return players.map(p => {
          const s = perPlayer[p.id];
          return { ...p, played:s.played, wins:s.wins, losses:s.losses, ptsDiff:s.ptsDiff,
            sessions: s.sessions.size,
            winRate: s.played ? Math.round((s.wins/s.played)*100) : 0 };
        }).filter(p => p.played > 0).sort(rankComparator);
      }, [players, matches]);

      // ── Render ────────────────────────────────────────────────────────────
      return (
        <div>
          <div className="section-title">STATISTICS <span>&amp; ANALYSIS</span></div>
          <div className="tabs-inner">
            {[{id:"individual",label:"Individual"},{id:"partnerships",label:"Partnerships"},{id:"h2h",label:"Head-to-Head"},{id:"session",label:"Session Analysis"},{id:"tournaments",label:"Tournaments"},{id:"awards",label:"Annual Awards"}].map(t=>(
              <button key={t.id} className={`tab-btn ${statsTab===t.id?"active":""} ${t.id==="tournaments"?"tab-tourn":""}`} onClick={()=>setStatsTab(t.id)}>{t.label}</button>
            ))}
          </div>

          {/* Tournament inclusion toggle — shown on Individual, Partnerships, Awards */}
          {["individual","partnerships","awards"].includes(statsTab) && (
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"10px 14px",background:"#111",border:"1px solid #1e1e1e",borderRadius:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:"0.78rem",color:"#ccc",fontWeight:500}}>
                  Data source:&nbsp;
                  <span style={{color:includeTournament?"#ffc800":ACCENT,fontWeight:600}}>
                    {includeTournament ? "Friendly + Tournament matches" : "Friendly matches only"}
                  </span>
                </div>
                <div style={{fontSize:"0.7rem",color:"#555",marginTop:2}}>
                  {includeTournament
                    ? "Tournament games are included in rankings and awards."
                    : "Only friendly sessions are counted. Toggle to include tournament data."}
                </div>
              </div>
              <button
                onClick={()=>setIncludeTournament(v=>!v)}
                style={{
                  display:"flex",alignItems:"center",gap:8,padding:"7px 14px",
                  border:`1px solid ${includeTournament?"rgba(255,200,0,0.4)":"#2a2a2a"}`,
                  borderRadius:20,background:includeTournament?"rgba(255,200,0,0.08)":"#1a1a1a",
                  cursor:"pointer",transition:"all 0.2s",flexShrink:0
                }}>
                <div style={{width:28,height:16,borderRadius:8,background:includeTournament?"#ffc800":"#333",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:includeTournament?14:2,transition:"left 0.2s"}} />
                </div>
                <span style={{fontSize:"0.75rem",color:includeTournament?"#ffc800":"#666",fontWeight:600,whiteSpace:"nowrap"}}>
                  {includeTournament?"🏆 Incl. Tournaments":"🏆 Excl. Tournaments"}
                </span>
              </button>
            </div>
          )}

          {/* Ranking note */}
          {["individual","partnerships","session"].includes(statsTab) && (
            <div style={{fontSize:"0.72rem",color:"#555",marginBottom:16,letterSpacing:"0.3px"}}>
              Ranked by: <span style={{color:"#888"}}>Wins → Win % → Points Diff → Sessions</span>
            </div>
          )}

          {/* ── INDIVIDUAL ───────────────────────────────────────────────── */}
          {statsTab==="individual"&&(
            individualStats.length===0 ? <div className="empty-state"><div className="icon">📊</div>No data yet.</div> :
            <div className="table-wrap table-scroll">
              <table>
                <thead><tr>
                  <th>#</th><th>Player</th><th title={includeTournament?"Friendly + tournament sessions":"Friendly sessions only"}>{includeTournament?"Sessions":"Friendly Sessions"}</th>
                  <th title="Total individual games played">Games</th>
                  <th>Wins</th><th>Losses</th>
                  <th title="Points scored minus points conceded">Pts Diff</th><th>Win %</th>
                </tr></thead>
                <tbody>
                  {individualStats.map((p,i)=>{
                    const rc=p.winRate>=60?ACCENT:p.winRate>=40?"#ffc800":"#ff6060";
                    return (
                      <tr key={p.id}>
                        <td style={{color:i===0?ACCENT:"#555",fontFamily:"Bebas Neue",fontSize:"1.1rem"}}>{i===0?"★":i+1}</td>
                        <td>
                          <div className="player-name-cell">
                            <div className="avatar" style={i===0?{borderColor:ACCENT,color:ACCENT}:{}}>{p.initials||initials(p.name)}</div>
                            {p.name}{i===0&&p.played>0&&<span className="top-badge">TOP</span>}
                          </div>
                        </td>
                        <td style={{textAlign:"center"}}>{p.sessions}</td>
                        <td style={{textAlign:"center"}}>{p.played}</td>
                        <td style={{color:ACCENT,fontWeight:600,textAlign:"center"}}>{p.wins}</td>
                        <td style={{color:"#ff6060",textAlign:"center"}}>{p.losses}</td>
                        <td style={{textAlign:"center",fontWeight:600,color:p.ptsDiff>0?ACCENT:p.ptsDiff<0?"#ff6060":"#aaa"}}>{p.ptsDiff>0?"+":""}{p.ptsDiff}</td>
                        <td>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{minWidth:36,fontSize:"0.85rem",fontWeight:600,color:rc}}>{p.winRate}%</span>
                            <div className="win-rate-bar" style={{flex:1,minWidth:70}}><div className="win-rate-fill" style={{width:`${p.winRate}%`}} /></div>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── PARTNERSHIPS ─────────────────────────────────────────────── */}
          {statsTab==="partnerships"&&(
            partnershipStats.length===0 ? <div className="empty-state"><div className="icon">🤝</div>No doubles matches logged yet.</div> :
            (() => {
              const filtered = filterPartnerPlayer==="all"
                ? partnershipStats
                : partnershipStats.filter(p => p.ids.includes(filterPartnerPlayer));
              const topPair = filtered[0]||null;
              return (
                <>
                  {/* Player filter */}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                    <select value={filterPartnerPlayer} onChange={e=>setFPP(e.target.value)}
                      style={{background:"#161616",border:"1px solid #252525",borderRadius:8,color:"#ccc",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"7px 12px"}}>
                      <option value="all">All Players</option>
                      {[...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>(
                        <option key={p.id} value={p.id}>{p.name}</option>
                      ))}
                    </select>
                    {filterPartnerPlayer!=="all"&&(
                      <span style={{fontSize:"0.78rem",color:"#999"}}>
                        Showing {filtered.length} partnership{filtered.length!==1?"s":""} for <span style={{color:ACCENT}}>{playerMap[filterPartnerPlayer]?.name}</span>
                      </span>
                    )}
                  </div>

                  {filtered.length===0 ? (
                    <div className="empty-state"><div className="icon">🤝</div>No partnerships found for this player.</div>
                  ) : (
                    <>
                      {topPair&&topPair.played>0&&(
                        <div className="form-section" style={{marginBottom:20}}>
                          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
                            <span style={{fontSize:"1.5rem"}}>🏆</span>
                            <div>
                              <div style={{fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"1px",color:"#999",marginBottom:4}}>
                                {filterPartnerPlayer==="all" ? "Best Partnership" : `Best Partner for ${playerMap[filterPartnerPlayer]?.name}`}
                              </div>
                              <div style={{fontFamily:"Bebas Neue",fontSize:"1.5rem",color:ACCENT}}>{topPair.ids.map(id=>playerMap[id]?.name||"?").join(" & ")}</div>
                              <div style={{fontSize:"0.82rem",color:"#ccc"}}>
                                {topPair.wins}W — {topPair.losses}L · {topPair.played} games ·
                                <span style={{marginLeft:6,color:topPair.ptsDiff>0?ACCENT:topPair.ptsDiff<0?"#ff6060":"#aaa"}}>
                                  PtsDiff {topPair.ptsDiff>0?"+":""}{topPair.ptsDiff}
                                </span>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}
                      <div className="table-wrap table-scroll">
                        <table>
                          <thead><tr>
                            <th>#</th><th>Partnership</th><th>Sessions</th><th>Games</th>
                            <th>Wins</th><th>Losses</th><th title="Points diff">Pts Diff</th><th>Win %</th>
                          </tr></thead>
                          <tbody>
                            {filtered.map((p,i)=>{
                              const wr=p.played?Math.round((p.wins/p.played)*100):0;
                              const rc=wr>=60?ACCENT:wr>=40?"#ffc800":"#ff6060";
                              return (
                                <tr key={p.ids.join("-")}>
                                  <td style={{color:i===0?ACCENT:"#555",fontFamily:"Bebas Neue",fontSize:"1.1rem"}}>{i===0?"★":i+1}</td>
                                  <td>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      {p.ids.map(id=><span key={id} className="avatar" style={i===0?{borderColor:ACCENT}:{}}>{playerMap[id]?.initials||initials(playerMap[id]?.name||"?")}</span>)}
                                      <span style={{fontWeight:500}}>{p.ids.map(id=>playerMap[id]?.name||"?").join(" & ")}</span>
                                      {i===0&&p.played>0&&<span className="top-badge">BEST DUO</span>}
                                    </div>
                                  </td>
                                  <td style={{textAlign:"center"}}>{p.sessions}</td>
                                  <td style={{textAlign:"center"}}>{p.played}</td>
                                  <td style={{color:ACCENT,fontWeight:600,textAlign:"center"}}>{p.wins}</td>
                                  <td style={{color:"#ff6060",textAlign:"center"}}>{p.losses}</td>
                                  <td style={{textAlign:"center",fontWeight:600,color:p.ptsDiff>0?ACCENT:p.ptsDiff<0?"#ff6060":"#aaa"}}>{p.ptsDiff>0?"+":""}{p.ptsDiff}</td>
                                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{minWidth:36,fontSize:"0.85rem",fontWeight:600,color:rc}}>{wr}%</span><div className="win-rate-bar" style={{flex:1,minWidth:70}}><div className="win-rate-fill" style={{width:`${wr}%`}} /></div></div></td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </>
                  )}
                </>
              );
            })()
          )}

          {/* ── HEAD-TO-HEAD ─────────────────────────────────────────────── */}
          {statsTab==="h2h"&&(
            h2h.length===0 ? <div className="empty-state"><div className="icon">⚔️</div>No matches logged yet.</div> :
            <div className="table-wrap table-scroll">
              <table>
                <thead><tr><th>Opponent</th><th>Sessions</th><th>Games</th><th>Our Wins</th><th>Our Losses</th><th>Win %</th></tr></thead>
                <tbody>
                  {h2h.map(row=>{
                    const wr=row.played?Math.round((row.wins/row.played)*100):0;
                    return (
                      <tr key={row.opp}>
                        <td style={{fontWeight:500}}>{row.opp}</td>
                        <td style={{textAlign:"center"}}>{row.sessions}</td>
                        <td style={{textAlign:"center"}}>{row.played}</td>
                        <td style={{color:ACCENT,fontWeight:600,textAlign:"center"}}>{row.wins}</td>
                        <td style={{color:"#ff6060",textAlign:"center"}}>{row.losses}</td>
                        <td><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{minWidth:36,fontSize:"0.85rem"}}>{wr}%</span><div className="win-rate-bar" style={{flex:1,minWidth:80}}><div className="win-rate-fill" style={{width:`${wr}%`}} /></div></div></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── SESSION ANALYSIS ─────────────────────────────────────────── */}
          {statsTab==="session"&&(
            <div>
              <div style={{marginBottom:24}}>
                <select value={selectedSession} onChange={e=>setSelectedSession(e.target.value)}
                  style={{background:"#161616",border:"1px solid #252525",borderRadius:8,color:"#ccc",fontFamily:"DM Sans,sans-serif",fontSize:"0.88rem",padding:"10px 14px",width:"100%",maxWidth:440}}>
                  <option value="">— Select a Session —</option>
                  {sessionsList.map(s=>(
                    <option key={s.key} value={s.key}>{s.date} · vs {s.opponent} ({s.games.length} game{s.games.length!==1?"s":""})</option>
                  ))}
                </select>
              </div>
              {!selectedSession&&<div className="empty-state"><div className="icon">📊</div>Select a session above to view its analysis.</div>}
              {sessionData&&(
                <div>
                  <div style={{marginBottom:20}}>
                    <div style={{fontFamily:"Bebas Neue",fontSize:"1.8rem",letterSpacing:"2px",color:"#fff",lineHeight:1}}>{sessionData.opponent}</div>
                    <div style={{color:"#999",fontSize:"0.82rem",marginTop:4}}>{sessionData.date} · {sessionData.games.length} games played</div>
                  </div>
                  <div className="stat-grid" style={{marginBottom:28}}>
                    <div className="stat-card"><div className="label">Win Rate</div><div className="value accent">{sessionData.pct}%</div><div className="win-rate-bar"><div className="win-rate-fill" style={{width:`${sessionData.pct}%`}} /></div></div>
                    <div className="stat-card"><div className="label">Wins</div><div className="value accent">{sessionData.wins}</div></div>
                    <div className="stat-card"><div className="label">Losses</div><div className="value" style={{color:"#ff6060"}}>{sessionData.losses}</div></div>
                    <div className="stat-card"><div className="label">Win Streak</div><div className="value">{sessionData.maxStreak}</div></div>
                    {CATEGORIES.map(cat=>{
                      const c=sessionData.cats[cat.key]; if(!c||(c.w+c.l===0)) return null;
                      const total=c.w+c.l; const wr=Math.round((c.w/total)*100);
                      return (
                        <div className="stat-card" key={cat.key} style={{borderTop:`2px solid ${cat.color}`}}>
                          <div className="label" style={{color:cat.color}}>{cat.key} — {cat.label}</div>
                          <div style={{fontFamily:"Bebas Neue",fontSize:"1.8rem",color:"#fff",lineHeight:1,marginBottom:4}}>
                            <span style={{color:ACCENT}}>{c.w}</span><span style={{color:"#444",fontSize:"1.2rem",margin:"0 4px"}}>–</span><span style={{color:"#ff6060"}}>{c.l}</span>
                          </div>
                          <div style={{fontSize:"0.72rem",color:"#999"}}>{total} games · {wr}% win rate</div>
                        </div>
                      );
                    })}
                    {sessionData.bestCat&&(
                      <div className="stat-card">
                        <div className="label">Strongest Category</div>
                        <div className="value" style={{color:catColors[sessionData.bestCat],fontSize:"2rem"}}>{sessionData.bestCat}</div>
                        <div style={{fontSize:"0.72rem",color:"#999",marginTop:4}}>
                          {(()=>{const c=sessionData.cats[sessionData.bestCat];const t=c.w+c.l;return `${c.w}W–${c.l}L · ${Math.round((c.w/t)*100)}%`;})()}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Highlights */}
                  {(sessionData.pairs.length>0||sessionData.individuals.length>0)&&(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16,marginBottom:28}}>
                      {sessionData.individuals[0]&&(
                        <div className="form-section" style={{marginBottom:0,padding:20}}>
                          <div style={{fontSize:"0.65rem",color:"#999",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>Session MVP</div>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div className="avatar" style={{borderColor:ACCENT,color:ACCENT}}>{playerMap[sessionData.individuals[0].id]?.initials||"?"}</div>
                            <div>
                              <div style={{fontWeight:600,fontSize:"0.95rem"}}>{playerMap[sessionData.individuals[0].id]?.name||"?"}</div>
                              <div style={{fontSize:"0.78rem",color:"#999",marginTop:2}}>{sessionData.individuals[0].wins}W – {sessionData.individuals[0].losses}L · PtsDiff {sessionData.individuals[0].ptsDiff>0?"+":""}{sessionData.individuals[0].ptsDiff}</div>
                            </div>
                          </div>
                        </div>
                      )}
                      {sessionData.pairs[0]&&(

    // ════════════════════════════════════════════════════════════════════════
    // TEAM BUILDER
    // ════════════════════════════════════════════════════════════════════════

    // Score a pair based on historical matches. Returns { played, wins, winRate, ptsDiff }
    // Ranking priority: Wins → Win % → Points Diff
    function scorePair(idA, idB, matches) {
      const relevant = matches.filter(m =>
        m.team1.length === 2 &&
        m.team1.includes(idA) && m.team1.includes(idB)
      );
      if (relevant.length === 0) return { played:0, wins:0, winRate:0, ptsDiff:0, noHistory:true };
      const wins    = relevant.filter(m => m.winner==="team1").length;
      const ptsDiff = relevant.reduce((s,m) => s + parsePointsDiff(m.score), 0);
      const winRate = wins / relevant.length;
      return { played:relevant.length, wins, winRate: Math.round(winRate*100), ptsDiff };
    }

    // Score individual for singles based on historical singles matches
    function scoreIndividual(id, gender, matches) {
      const catKey = gender==="M" ? "MS" : "WS";
      const relevant = matches.filter(m =>
        (matchCategory(m)===catKey) && m.team1.includes(id)
      );
      if (relevant.length===0) return { played:0, wins:0, winRate:0, ptsDiff:0, score:0, noHistory:true };
      const wins    = relevant.filter(m=>m.winner==="team1").length;
      const ptsDiff = relevant.reduce((s,m)=>s+parsePointsDiff(m.score),0);
      const winRate = wins/relevant.length;
      const score   = winRate*100 + Math.min(relevant.length,20)*1.5 + ptsDiff*0.3;
      return { played:relevant.length, wins, winRate:Math.round(winRate*100), ptsDiff, score };
    }

    // Greedy team assignment algorithm
    // Given selected males, females, numTeams, and formation (md,wd,xd per team),
    // distribute players into teams maximising historical pair strength.
    function buildTeams({ males, females, numTeams, formation, matches }) {
      // Build all possible pairs with scores
      const mdPairs = []; // male+male
      const wdPairs = []; // female+female
      const xdPairs = []; // male+female

      for (let i=0;i<males.length;i++) for (let j=i+1;j<males.length;j++) {
        const s = scorePair(males[i].id, males[j].id, matches);
        mdPairs.push({ ids:[males[i].id, males[j].id], ...s, cat:"MD" });
      }
      for (let i=0;i<females.length;i++) for (let j=i+1;j<females.length;j++) {
        const s = scorePair(females[i].id, females[j].id, matches);
        wdPairs.push({ ids:[females[i].id, females[j].id], ...s, cat:"WD" });
      }
      for (let i=0;i<males.length;i++) for (let j=0;j<females.length;j++) {
        const s = scorePair(males[i].id, females[j].id, matches);
        xdPairs.push({ ids:[males[i].id, females[j].id], ...s, cat:"XD" });
      }

      // Sort: Wins descending → Win % descending → Points Diff descending
      const pairSort = (a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.winRate !== a.winRate) return b.winRate - a.winRate;
        return b.ptsDiff - a.ptsDiff;
      };
      mdPairs.sort(pairSort);
      wdPairs.sort(pairSort);
      xdPairs.sort(pairSort);

      // We'll fill MD slots first (across all teams), then WD, then XD
      // This ensures the top pairs get placed before player availability shrinks
      const teams = Array.from({length:numTeams}, (_,i) => ({
        label: `Team ${i+1}`,
        slots: [],
        usedIds: new Set(),
      }));

      // Global set — once a player is assigned anywhere they cannot appear again
      const globalUsed = new Set();

      // Helper: pick top available pair for a specific team, respecting both
      // per-team uniqueness (a player can't appear twice in the same team) AND
      // global uniqueness (a player can't appear in more than one team).
      const pickPair = (sortedPairs, team) => {
        for (const pair of sortedPairs) {
          if (pair._used) continue;
          if (pair.ids.some(id => globalUsed.has(id) || team.usedIds.has(id))) continue;
          pair._used = true;
          pair.ids.forEach(id => { globalUsed.add(id); team.usedIds.add(id); });
          return pair;
        }
        return null;
      };

      // Assign slots team-by-team, category-by-category
      // Strategy: round-robin across teams per category so team 1 doesn't claim all top pairs
      const { md, wd, xd } = formation;

      // For each slot index within a category, go round-robin across teams
      for (let slot=0; slot<md; slot++) {
        for (let t=0; t<numTeams; t++) {
          const pair = pickPair(mdPairs, teams[t]);
          teams[t].slots.push({ cat:"MD", ids: pair ? pair.ids : [], stats: pair || null });
        }
      }
      for (let slot=0; slot<wd; slot++) {
        for (let t=0; t<numTeams; t++) {
          const pair = pickPair(wdPairs, teams[t]);
          teams[t].slots.push({ cat:"WD", ids: pair ? pair.ids : [], stats: pair || null });
        }
      }
      for (let slot=0; slot<xd; slot++) {
        for (let t=0; t<numTeams; t++) {
          const pair = pickPair(xdPairs, teams[t]);
          teams[t].slots.push({ cat:"XD", ids: pair ? pair.ids : [], stats: pair || null });
        }
      }

      // Clean up _used flags
      [...mdPairs,...wdPairs,...xdPairs].forEach(p => { delete p._used; });

      return teams;
    }

    const CAT_COLORS_TB = { MD: ACCENT2, WD:"#ff80c8", XD:"#FF9500" };

    function TeamBuilder({ players, matches }) {
      const playerMap = getPlayerMap(players);
      const males   = players.filter(p => p.gender==="M");
      const females = players.filter(p => p.gender==="F");

      // ── Step state ──────────────────────────────────────────────────────
      const [step, setStep]             = useState(1);
      const [title, setTitle]           = useState("");
      const [useTournament, setUT]      = useState(false);
      const [selectedMales, setSM]      = useState([]);
      const [selectedFemales, setSF]    = useState([]);
      const [numTeams, setNumTeams]      = useState(1);
      const [formation, setFormation]    = useState({ md:0, wd:0, xd:0 });
      const [result, setResult]          = useState(null);
      const [err, setErr]                = useState("");

      const totalSlots = formation.md + formation.wd + formation.xd;

      // Required player counts
      const malesNeeded   = formation.md * 2 * numTeams + formation.xd * numTeams;
      const femalesNeeded = formation.wd * 2 * numTeams + formation.xd * numTeams;

      const toggleMale   = id => setSM(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);
      const toggleFemale = id => setSF(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);

      const setF = (k, v) => setFormation(f => ({ ...f, [k]: Math.max(0, Math.min(10, parseInt(v)||0)) }));

      // ── Validation per step ─────────────────────────────────────────────
      const validateStep1 = () => {
        if (!title.trim()) return "Please enter a title for this formation.";
        if (selectedMales.length === 0 && selectedFemales.length === 0)
          return "Select at least one player.";
        return null;
      };
      const validateStep2 = () => {
        if (numTeams < 1) return "You need at least 1 team.";
        return null;
      };
      const validateStep3 = () => {
        if (totalSlots === 0) return "Add at least one formation slot per team.";
        const malesSelected   = selectedMales.length;
        const femalesSelected = selectedFemales.length;
        if (malesSelected < malesNeeded)
          return `Formation needs ${malesNeeded} male player slots across ${numTeams} teams, but only ${malesSelected} male(s) selected. Add more males or reduce MD/XD slots.`;
        if (femalesSelected < femalesNeeded)
          return `Formation needs ${femalesNeeded} female player slots across ${numTeams} teams, but only ${femalesSelected} female(s) selected. Add more females or reduce WD/XD slots.`;
        return null;
      };

      const goStep = (n) => {
        setErr("");
        if (n > step) {
          let e = null;
          if (step===1) e = validateStep1();
          if (step===2) e = validateStep2();
          if (step===3) e = validateStep3();
          if (e) { setErr(e); return; }
        }
        if (n===4) {
          const maleObjs   = selectedMales.map(id => playerMap[id]).filter(Boolean);
          const femaleObjs = selectedFemales.map(id => playerMap[id]).filter(Boolean);
          const filteredMatches = useTournament ? matches : matches.filter(m => m.type !== "tournament");
          const teams = buildTeams({ males:maleObjs, females:femaleObjs, numTeams, formation, matches:filteredMatches });
          setResult(teams);
        }
        setStep(n);
      };

      const reset = () => { setStep(1); setTitle(""); setUT(false); setSM([]); setSF([]); setNumTeams(1); setFormation({md:0,wd:0,xd:0}); setResult(null); setErr(""); };

      // Strength badge colour
      const strengthColor = (winRate, noHistory) => {
        if (noHistory) return "#555";
        if (winRate >= 65) return ACCENT;
        if (winRate >= 45) return "#ffc800";
        return "#ff6060";
      };
      const strengthLabel = (stats) => {
        if (!stats || stats.noHistory) return "No history";
        return `${stats.wins}W-${stats.played-stats.wins}L · ${stats.winRate}% · PtsDiff ${stats.ptsDiff>0?"+":""}${stats.ptsDiff}`;
      };

      // ── Stepper header ───────────────────────────────────────────────────
      const steps = [
        { n:1, label:"Select Players" },
        { n:2, label:"No. of Teams" },
        { n:3, label:"Formation" },
        { n:4, label:"Proposed Teams" },
      ];

      return (
        <div>
          <div className="section-title no-print">TEAM <span>BUILDER</span></div>

          {/* Stepper */}
          <div className="no-print" style={{display:"flex",alignItems:"center",gap:0,marginBottom:28,overflowX:"auto"}}>
            {steps.map((s,i)=>(
              <React.Fragment key={s.n}>
                <div onClick={()=>s.n<step&&goStep(s.n)}
                  style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:s.n<step?"pointer":"default",minWidth:90}}>
                  <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.78rem",fontWeight:700,
                    background:step===s.n?"#AAFF00":step>s.n?"rgba(170,255,0,0.2)":"#1a1a1a",
                    color:step===s.n?"#0f0f0f":step>s.n?ACCENT:"#555",
                    border:`2px solid ${step>=s.n?ACCENT:"#2a2a2a"}`,transition:"all 0.2s"}}>
                    {step>s.n?"✓":s.n}
                  </div>
                  <div style={{fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"0.8px",color:step===s.n?ACCENT:step>s.n?"#888":"#444",whiteSpace:"nowrap"}}>{s.label}</div>
                </div>
                {i<steps.length-1&&<div style={{flex:1,height:2,background:step>s.n?ACCENT+"44":"#1e1e1e",margin:"0 4px",marginBottom:16,transition:"background 0.3s"}} />}
              </React.Fragment>
            ))}
          </div>

          {err&&<div className="alert alert-error no-print">{err}</div>}

          {/* ── STEP 1: Select Players ──────────────────────────────────── */}
          {step===1&&(
            <div>
              {/* Title + data source */}
              <div className="form-section">
                <h3>Formation Details</h3>
                <div className="field" style={{marginBottom:18}}>
                  <label>Formation Title <span style={{color:"#ff6060",fontSize:"0.65rem"}}>required</span></label>
                  <input value={title} onChange={e=>setTitle(e.target.value)}
                    placeholder="e.g. League Match vs Club Red, 12 Apr"
                    onKeyDown={e=>e.key==="Enter"&&goStep(2)}
                    style={{fontSize:"0.95rem"}} />
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#0f0f0f",border:"1px solid #1e1e1e",borderRadius:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"0.78rem",color:"#ccc",fontWeight:500}}>
                      Stats source:&nbsp;
                      <span style={{color:useTournament?"#ffc800":ACCENT,fontWeight:600}}>
                        {useTournament ? "Friendly + Tournament" : "Friendly matches only"}
                      </span>
                    </div>
                    <div style={{fontSize:"0.7rem",color:"#555",marginTop:2}}>
                      {useTournament ? "Tournament match history is included when scoring pairs." : "Only friendly session data is used to score pairs. Toggle to include tournaments."}
                    </div>
                  </div>
                  <button onClick={()=>setUT(v=>!v)}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",
                      border:`1px solid ${useTournament?"rgba(255,200,0,0.4)":"#2a2a2a"}`,
                      borderRadius:20,background:useTournament?"rgba(255,200,0,0.08)":"#1a1a1a",
                      cursor:"pointer",transition:"all 0.2s",flexShrink:0}}>
                    <div style={{width:28,height:16,borderRadius:8,background:useTournament?"#ffc800":"#333",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                      <div style={{width:12,height:12,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:useTournament?14:2,transition:"left 0.2s"}} />
                    </div>
                    <span style={{fontSize:"0.75rem",color:useTournament?"#ffc800":"#666",fontWeight:600,whiteSpace:"nowrap"}}>
                      {useTournament?"🏆 Incl. Tournaments":"🏆 Excl. Tournaments"}
                    </span>
                  </button>
                </div>
              </div>

              <div className="form-section">
                <h3>Select Male Players ♂</h3>
                {males.length===0
                  ? <div style={{color:"#555",fontSize:"0.85rem"}}>No male players in roster. Add players first.</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                      {males.map(p=>{
                        const sel = selectedMales.includes(p.id);
                        return (
                          <button key={p.id} onClick={()=>toggleMale(p.id)}
                            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:24,border:`1px solid ${sel?ACCENT2+"88":"#2a2a2a"}`,
                              background:sel?"rgba(0,229,255,0.08)":"#1a1a1a",cursor:"pointer",transition:"all 0.15s"}}>
                            <div className="avatar" style={{width:26,height:26,fontSize:"0.6rem",borderColor:sel?ACCENT2:"#2a2a2a",color:sel?ACCENT2:"#555"}}>{p.initials||initials(p.name)}</div>
                            <span style={{fontSize:"0.85rem",color:sel?ACCENT2:"#ccc",fontWeight:sel?600:400}}>{p.name}</span>
                            {sel&&<span style={{color:ACCENT2,fontSize:"0.75rem"}}>✓</span>}
                          </button>
                        );
                      })}
                    </div>
                }
                <div style={{marginTop:12,fontSize:"0.78rem",color:"#666"}}>{selectedMales.length} male{selectedMales.length!==1?"s":""} selected
                  {selectedMales.length>0&&<button onClick={()=>setSM([])} style={{background:"none",border:"none",color:"#ff6060",cursor:"pointer",fontSize:"0.75rem",marginLeft:12}}>Clear</button>}
                  <button onClick={()=>setSM(males.map(m=>m.id))} style={{background:"none",border:"none",color:ACCENT2,cursor:"pointer",fontSize:"0.75rem",marginLeft:8}}>Select all</button>
                </div>
              </div>

              <div className="form-section">
                <h3>Select Female Players ♀</h3>
                {females.length===0
                  ? <div style={{color:"#555",fontSize:"0.85rem"}}>No female players in roster.</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                      {females.map(p=>{
                        const sel = selectedFemales.includes(p.id);
                        return (
                          <button key={p.id} onClick={()=>toggleFemale(p.id)}
                            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:24,border:`1px solid ${sel?"#ff80c888":"#2a2a2a"}`,
                              background:sel?"rgba(255,128,200,0.08)":"#1a1a1a",cursor:"pointer",transition:"all 0.15s"}}>
                            <div className="avatar" style={{width:26,height:26,fontSize:"0.6rem",borderColor:sel?"#ff80c8":"#2a2a2a",color:sel?"#ff80c8":"#555"}}>{p.initials||initials(p.name)}</div>
                            <span style={{fontSize:"0.85rem",color:sel?"#ff80c8":"#ccc",fontWeight:sel?600:400}}>{p.name}</span>
                            {sel&&<span style={{color:"#ff80c8",fontSize:"0.75rem"}}>✓</span>}
                          </button>
                        );
                      })}
                    </div>
                }
                <div style={{marginTop:12,fontSize:"0.78rem",color:"#666"}}>{selectedFemales.length} female{selectedFemales.length!==1?"s":""} selected
                  {selectedFemales.length>0&&<button onClick={()=>setSF([])} style={{background:"none",border:"none",color:"#ff6060",cursor:"pointer",fontSize:"0.75rem",marginLeft:12}}>Clear</button>}
                  <button onClick={()=>setSF(females.map(f=>f.id))} style={{background:"none",border:"none",color:"#ff80c8",cursor:"pointer",fontSize:"0.75rem",marginLeft:8}}>Select all</button>
                </div>
              </div>

              <div style={{display:"flex",justifyContent:"flex-end"}}>
                <button className="btn btn-primary" onClick={()=>goStep(2)}>Next: Number of Teams →</button>
              </div>
            </div>
          )}

          {/* ── STEP 2: Number of Teams ─────────────────────────────────── */}
          {step===2&&(
            <div>
              <div className="form-section">
                <h3>How many teams to form?</h3>
                <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
                  <button onClick={()=>setNumTeams(t=>Math.max(1,t-1))} style={{width:40,height:40,borderRadius:8,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1.3rem"}}>−</button>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontFamily:"Bebas Neue",fontSize:"3.5rem",color:ACCENT,lineHeight:1,letterSpacing:"2px"}}>{numTeams}</div>
                    <div style={{fontSize:"0.72rem",color:"#999",textTransform:"uppercase",letterSpacing:"1px"}}>Teams</div>
                  </div>
                  <button onClick={()=>setNumTeams(t=>Math.min(10,t+1))} style={{width:40,height:40,borderRadius:8,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1.3rem"}}>+</button>
                </div>
                <div style={{background:"#0f0f0f",border:"1px solid #1e1e1e",borderRadius:8,padding:"12px 16px",display:"flex",gap:20,flexWrap:"wrap"}}>
                  <div style={{fontSize:"0.78rem"}}>
                    <span style={{color:"#999"}}>Selected players: </span>
                    <span style={{color:ACCENT2}}>{selectedMales.length} ♂</span>
                    <span style={{color:"#444",margin:"0 6px"}}>·</span>
                    <span style={{color:"#ff80c8"}}>{selectedFemales.length} ♀</span>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:12,justifyContent:"space-between"}}>
                <button className="btn btn-secondary" onClick={()=>goStep(1)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>goStep(3)}>Next: Formation →</button>
              </div>
            </div>
          )}

          {/* ── STEP 3: Formation ───────────────────────────────────────── */}
          {step===3&&(
            <div>
              <div className="form-section">
                <h3>Formation per Team</h3>
                <p style={{fontSize:"0.82rem",color:"#999",marginBottom:20,lineHeight:1.5}}>
                  Define how many MD, WD and XD matches each team will play.
                  Players are allocated to maximise historical win rates.
                </p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
                  {[{k:"md",label:"Men's Doubles",color:ACCENT2},{k:"wd",label:"Women's Doubles",color:"#ff80c8"},{k:"xd",label:"Mixed Doubles",color:"#FF9500"}].map(({k,label,color})=>(
                    <div key={k} style={{background:"#0f0f0f",border:`1px solid ${formation[k]>0?color+"44":"#222"}`,borderRadius:10,padding:"18px 14px",textAlign:"center"}}>
                      <div style={{fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1.2px",color,marginBottom:6,fontWeight:700}}>{k.toUpperCase()}</div>
                      <div style={{fontSize:"0.75rem",color:"#888",marginBottom:12}}>{label}</div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                        <button onClick={()=>setF(k,formation[k]-1)} style={{width:28,height:28,borderRadius:6,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1rem"}}>−</button>
                        <input type="number" min="0" max="10" value={formation[k]} onChange={e=>setF(k,e.target.value)}
                          style={{width:48,textAlign:"center",background:"#0f0f0f",border:`1px solid ${formation[k]>0?color+"66":"#2a2a2a"}`,borderRadius:6,color:formation[k]>0?color:"#ccc",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.4rem",padding:"4px 0"}} />
                        <button onClick={()=>setF(k,formation[k]+1)} style={{width:28,height:28,borderRadius:6,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",cursor:"pointer",fontSize:"1rem"}}>+</button>
                      </div>
                      {formation[k]>0&&<div style={{fontSize:"0.7rem",color:"#999",marginTop:8}}>{formation[k]} match{formation[k]!==1?"es":""} / team</div>}
                    </div>
                  ))}
                </div>

                {/* Requirements summary */}
                <div style={{background:"#0f0f0f",border:"1px solid #1e1e1e",borderRadius:8,padding:"14px 16px"}}>
                  <div style={{fontSize:"0.7rem",color:"#777",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,fontWeight:600}}>Requirements for {numTeams} teams</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:"0.82rem"}}>
                    <div>
                      <span style={{color:"#999"}}>Male slots needed: </span>
                      <span style={{color:malesNeeded<=selectedMales.length?ACCENT:"#ff6060",fontWeight:600}}>{malesNeeded}</span>
                      <span style={{color:"#555",fontSize:"0.72rem"}}> ({selectedMales.length} selected)</span>
                      {malesNeeded>selectedMales.length&&<div style={{color:"#ff6060",fontSize:"0.72rem",marginTop:2}}>⚠ Need {malesNeeded-selectedMales.length} more male(s)</div>}
                    </div>
                    <div>
                      <span style={{color:"#999"}}>Female slots needed: </span>
                      <span style={{color:femalesNeeded<=selectedFemales.length?ACCENT:"#ff6060",fontWeight:600}}>{femalesNeeded}</span>
                      <span style={{color:"#555",fontSize:"0.72rem"}}> ({selectedFemales.length} selected)</span>
                      {femalesNeeded>selectedFemales.length&&<div style={{color:"#ff6060",fontSize:"0.72rem",marginTop:2}}>⚠ Need {femalesNeeded-selectedFemales.length} more female(s)</div>}
                    </div>
                    <div>
                      <span style={{color:"#999"}}>Total matches / team: </span>
                      <span style={{color:"#ccc",fontWeight:600}}>{totalSlots}</span>
                    </div>
                    <div>
                      <span style={{color:"#999"}}>Total matches overall: </span>
                      <span style={{color:"#ccc",fontWeight:600}}>{totalSlots*numTeams}</span>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:12,justifyContent:"space-between"}}>
                <button className="btn btn-secondary" onClick={()=>goStep(2)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>goStep(4)}
                  style={{opacity:totalSlots>0?1:0.5}}>
                  🧩 Build Teams →
                </button>
              </div>
            </div>
          )}

          {/* ── STEP 4: Results ─────────────────────────────────────────── */}
          {step===4&&result&&(
            <div>
              {/* Screen header */}
              <div className="no-print" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontFamily:"Bebas Neue",fontSize:"1.6rem",letterSpacing:"2px",color:ACCENT,lineHeight:1}}>{title}</div>
                  <div style={{fontSize:"0.78rem",color:"#999",marginTop:4,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                    <span>{numTeams} team{numTeams!==1?"s":""} · {formation.md} MD + {formation.wd} WD + {formation.xd} XD per team</span>
                    <span style={{background:useTournament?"rgba(255,200,0,0.1)":"rgba(170,255,0,0.08)",
                      border:`1px solid ${useTournament?"rgba(255,200,0,0.25)":"rgba(170,255,0,0.15)"}`,
                      color:useTournament?"#ffc800":"#888",borderRadius:4,padding:"2px 8px",fontSize:"0.68rem",fontWeight:600}}>
                      {useTournament?"Stats: Friendly + Tournament":"Stats: Friendly only"}
                    </span>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-secondary btn-sm no-print" onClick={reset}>↺ Start Over</button>
                  <button className="btn btn-secondary btn-sm no-print" onClick={()=>goStep(3)}>← Edit Formation</button>
                  <button className="btn btn-primary btn-sm no-print" onClick={()=>window.print()}>🖨 Print Formation</button>
                </div>
              </div>

              {/* Print-only title */}
              <div style={{display:"none"}} className="print-title">KK UNITED — {title}</div>
              <div style={{display:"none",fontSize:"0.82rem",color:"#555",marginBottom:20}}>
                {formation.md} MD + {formation.wd} WD + {formation.xd} XD per team · {useTournament?"Stats: Friendly + Tournament":"Stats: Friendly only"} · Generated {new Date().toLocaleDateString()}
              </div>

              {/* Legend */}
              <div className="no-print" style={{background:"rgba(170,255,0,0.04)",border:"1px solid rgba(170,255,0,0.1)",borderRadius:8,padding:"10px 14px",marginBottom:20,fontSize:"0.75rem",color:"#888",lineHeight:1.6}}>
                <span style={{color:ACCENT,fontWeight:600,marginRight:8}}>How it works</span>
                Pairs are ranked by historical win rate → games played (confidence) → points difference. The strongest available pair is assigned first using a round-robin draft across teams.
                <span style={{color:"#555",marginLeft:6}}>Pairs with no shared history are marked "No history".</span>
              </div>

              {/* No-history warning if applicable */}
              {result.some(t=>t.slots.some(s=>s.stats?.noHistory||!s.stats))&&(
                <div className="no-print" style={{background:"rgba(255,200,0,0.06)",border:"1px solid rgba(255,200,0,0.15)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:"0.75rem",color:"#ffc800"}}>
                  ⚠ Some pairs have no recorded match history together. Ratings are based on individual performance only. Consider these as wildcards.
                </div>
              )}

              {/* Team cards grid */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:20}}>
                {result.map((team,ti)=>{
                  // Compute team aggregate strength
                  const historicSlots = team.slots.filter(s=>s.stats&&!s.stats.noHistory);
                  const avgWinRate = historicSlots.length>0 ? Math.round(historicSlots.reduce((s,sl)=>s+sl.stats.winRate,0)/historicSlots.length) : null;
                  const totalPtsDiff = historicSlots.reduce((s,sl)=>s+sl.stats.ptsDiff,0);
                  const strengthCol = avgWinRate!==null ? (avgWinRate>=65?ACCENT:avgWinRate>=45?"#ffc800":"#ff6060") : "#555";

                  return (
                    <div key={ti} className="team-card-print"
                      style={{background:"#161616",border:`1px solid #2a2a2a`,borderRadius:14,overflow:"hidden",position:"relative"}}>
                      {/* Team header */}
                      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #1e1e1e",position:"relative"}}>
                        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${strengthCol},transparent)`}} />
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                          <div style={{fontFamily:"Bebas Neue",fontSize:"1.5rem",letterSpacing:"2px",color:"#fff"}} className="print-team-name">
                            {team.label}
                          </div>
                          {avgWinRate!==null&&(
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:"Bebas Neue",fontSize:"1.3rem",color:strengthCol,letterSpacing:"1px"}}>{avgWinRate}%</div>
                              <div style={{fontSize:"0.62rem",color:"#555",textTransform:"uppercase",letterSpacing:"0.8px"}}>Avg Win Rate</div>
                            </div>
                          )}
                        </div>
                        {/* Roster chips */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {[...new Set(team.slots.flatMap(s=>s.ids))].map(id=>{
                            const p=playerMap[id];
                            return (
                              <div key={id} style={{display:"flex",alignItems:"center",gap:5,background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:16,padding:"3px 9px"}}>
                                <div className="avatar" style={{width:18,height:18,fontSize:"0.5rem",borderColor:"#333"}}>{p?.initials||"?"}</div>
                                <span style={{fontSize:"0.72rem",color:"#ccc"}}>{p?.name||"?"}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Slots */}
                      <div style={{padding:"12px 18px",display:"flex",flexDirection:"column",gap:10}}>
                        {team.slots.map((slot,si)=>{
                          const col  = CAT_COLORS_TB[slot.cat]||"#888";
                          const stats = slot.stats;
                          const noH  = !stats || stats.noHistory;
                          const wr   = stats?.winRate ?? null;
                          const wrCol = noH ? "#555" : (wr>=65?ACCENT:wr>=45?"#ffc800":"#ff6060");
                          return (
                            <div key={si} className="print-slot"
                              style={{background:"#0f0f0f",border:`1px solid ${noH?"#1a1a1a":col+"2a"}`,borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${noH?"#2a2a2a":col}`}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                                <span className="print-slot-cat" style={{fontFamily:"Bebas Neue",fontSize:"0.78rem",letterSpacing:"1.5px",color:col}}>{slot.cat} {si+1>team.slots.filter(s=>s.cat===slot.cat).indexOf(slot)&&""}</span>
                                <span style={{fontSize:"0.7rem",color:wrCol,fontWeight:600}}>
                                  {noH ? "No history" : `${wr}%`}
                                </span>
                              </div>
                              <div className="print-slot-names" style={{display:"flex",alignItems:"center",gap:8,marginBottom:noH?0:4}}>
                                {slot.ids.length===0
                                  ? <span style={{color:"#444",fontSize:"0.82rem",fontStyle:"italic"}}>No eligible pair found</span>
                                  : slot.ids.map(id=>{
                                      const p=playerMap[id];
                                      return (
                                        <div key={id} style={{display:"flex",alignItems:"center",gap:5}}>
                                          <div className="avatar" style={{width:24,height:24,fontSize:"0.58rem",borderColor:col+"66",color:col}}>{p?.initials||"?"}</div>
                                          <span style={{fontSize:"0.84rem",fontWeight:500,color:"#e8e8e8"}}>{p?.name||"?"}</span>
                                        </div>
                                      );
                                    }).reduce((a,b)=>[a,<span key="vs" style={{color:"#444",fontSize:"0.8rem",fontFamily:"Bebas Neue",letterSpacing:"1px",margin:"0 2px"}}>&</span>,b])}
                              </div>
                              {!noH&&stats&&(
                                <div className="print-slot-stat" style={{fontSize:"0.7rem",color:"#666",display:"flex",gap:10}}>
                                  <span>{stats.wins}W–{stats.played-stats.wins}L</span>
                                  <span style={{color:stats.ptsDiff>0?ACCENT:stats.ptsDiff<0?"#ff6060":"#555"}}>PtsDiff {stats.ptsDiff>0?"+":""}{stats.ptsDiff}</span>
                                  <span>{stats.played} game{stats.played!==1?"s":""} together</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>

                      {/* Card footer strength */}
                      {avgWinRate!==null&&(
                        <div style={{padding:"8px 18px 14px",borderTop:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:10}}>
                          <div style={{flex:1,height:3,background:"#1a1a1a",borderRadius:3}}>
                            <div style={{width:`${avgWinRate}%`,height:"100%",background:strengthCol,borderRadius:3,transition:"width 0.5s"}} />
                          </div>
                          <span style={{fontSize:"0.68rem",color:"#555"}}>
                            PtsDiff {totalPtsDiff>0?"+":""}{totalPtsDiff} · {historicSlots.length}/{team.slots.length} pairs with data
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Bottom actions */}
              <div className="no-print" style={{marginTop:24,display:"flex",gap:12,justifyContent:"center"}}>
                <button className="btn btn-secondary" onClick={reset}>↺ Start Over</button>
                <button className="btn btn-primary" onClick={()=>window.print()}>🖨 Print Formation</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Mount ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
